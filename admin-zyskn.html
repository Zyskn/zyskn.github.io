<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZYSKN · Admin</title>
  <meta name="robots" content="noindex, nofollow">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --red:#A30000; --black:#000; --white:#fff;
      --gray:#F5F5F5; --gray-mid:#e8e8e8; --muted:#666;
      --green:#16a34a; --orange:#ea580c;
      --ease: cubic-bezier(0.16,1,0.3,1);
    }
    body { font-family:'Inter',sans-serif; background:var(--gray); color:var(--black); min-height:100vh; }

    /* ── LOGIN ── */
    #loginScreen {
      display:flex; align-items:center; justify-content:center;
      min-height:100vh; padding:2rem;
    }
    .login-box {
      background:#fff; border:1px solid rgba(0,0,0,.1);
      padding:3rem 2.5rem; width:100%; max-width:380px;
      box-shadow:0 20px 60px rgba(0,0,0,.08);
    }
    .login-logo { font-size:2rem; font-weight:900; letter-spacing:-.04em; margin-bottom:.2rem; }
    .login-sub { font-size:.62rem; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.18em; margin-bottom:2.5rem; }
    .login-box label { display:block; font-size:.62rem; font-weight:800; text-transform:uppercase; letter-spacing:.1em; margin-bottom:.3rem; }
    .login-box input {
      width:100%; padding:.75rem; border:1.5px solid var(--gray-mid);
      font-size:.85rem; font-family:'Inter',sans-serif; outline:none;
      margin-bottom:1rem; transition:border-color .2s;
    }
    .login-box input:focus { border-color:var(--black); }
    .btn-login {
      width:100%; background:var(--black); color:#fff; border:none;
      padding:.9rem; font-size:.78rem; font-weight:800; text-transform:uppercase;
      letter-spacing:.1em; cursor:pointer; transition:opacity .2s;
      font-family:'Inter',sans-serif;
    }
    .btn-login:hover { opacity:.85; }
    #loginError { color:var(--red); font-size:.72rem; font-weight:700; margin-top:.8rem; display:none; }

    /* ── LAYOUT ── */
    #adminApp { display:none; min-height:100vh; }
    .admin-header {
      background:var(--black); color:#fff; padding:1rem 2rem;
      display:flex; justify-content:space-between; align-items:center;
      position:sticky; top:0; z-index:100;
    }
    .admin-logo { font-size:1.2rem; font-weight:900; letter-spacing:-.03em; }
    .admin-logo span { color:var(--red); font-size:.6rem; font-weight:700; text-transform:uppercase; letter-spacing:.18em; display:block; margin-top:1px; }
    .header-right { display:flex; align-items:center; gap:1rem; }
    .admin-user { font-size:.65rem; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:#888; }
    .btn-logout {
      background:none; border:1px solid #333; color:#888;
      padding:.4rem .9rem; font-size:.6rem; font-weight:800; text-transform:uppercase;
      letter-spacing:.08em; cursor:pointer; font-family:'Inter',sans-serif; transition:all .2s;
    }
    .btn-logout:hover { border-color:#fff; color:#fff; }

    .admin-nav {
      background:#fff; border-bottom:1px solid rgba(0,0,0,.08);
      padding:0 2rem; display:flex; gap:0;
    }
    .tab-btn {
      padding:1rem 1.5rem; font-size:.7rem; font-weight:800; text-transform:uppercase;
      letter-spacing:.1em; border:none; background:none; cursor:pointer;
      border-bottom:2px solid transparent; color:var(--muted); transition:all .2s;
      font-family:'Inter',sans-serif;
    }
    .tab-btn.active { color:var(--black); border-bottom-color:var(--red); }
    .tab-btn:hover { color:var(--black); }

    .admin-content { padding:2rem; max-width:1200px; margin:0 auto; }

    /* ── CARDS ── */
    .stats-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:1rem; margin-bottom:2rem; }
    .stat-card {
      background:#fff; padding:1.5rem; border:1px solid rgba(0,0,0,.06);
      display:flex; flex-direction:column; gap:.3rem;
    }
    .stat-num { font-size:2rem; font-weight:900; }
    .stat-label { font-size:.62rem; font-weight:800; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); }
    .stat-card.red .stat-num { color:var(--red); }
    .stat-card.green .stat-num { color:var(--green); }
    .stat-card.orange .stat-num { color:var(--orange); }

    /* ── SECTION HEADERS ── */
    .section-hdr {
      display:flex; justify-content:space-between; align-items:center;
      margin-bottom:1.5rem; padding-bottom:1rem;
      border-bottom:1px solid rgba(0,0,0,.08);
    }
    .section-hdr h2 { font-size:1rem; font-weight:900; text-transform:uppercase; letter-spacing:-.01em; }
    .btn-primary {
      background:var(--black); color:#fff; border:none;
      padding:.7rem 1.5rem; font-size:.68rem; font-weight:800; text-transform:uppercase;
      letter-spacing:.1em; cursor:pointer; font-family:'Inter',sans-serif; transition:opacity .2s;
    }
    .btn-primary:hover { opacity:.8; }
    .btn-danger { background:var(--red); }
    .btn-success { background:var(--green); }
    .btn-outline {
      background:#fff; color:var(--black); border:1.5px solid var(--gray-mid);
      padding:.5rem 1rem; font-size:.62rem; font-weight:800; text-transform:uppercase;
      letter-spacing:.08em; cursor:pointer; font-family:'Inter',sans-serif; transition:all .2s;
    }
    .btn-outline:hover { border-color:var(--black); }

    /* ── PRODUCT TABLE ── */
    .product-table { width:100%; border-collapse:collapse; background:#fff; font-size:.78rem; }
    .product-table th {
      text-align:left; padding:.75rem 1rem; font-size:.6rem; font-weight:900;
      text-transform:uppercase; letter-spacing:.1em; color:var(--muted);
      border-bottom:2px solid var(--gray-mid); background:#fff;
    }
    .product-table td { padding:.9rem 1rem; border-bottom:1px solid rgba(0,0,0,.05); vertical-align:middle; }
    .product-table tr:hover td { background:rgba(0,0,0,.02); }
    .product-thumb { width:48px; height:60px; object-fit:cover; border-radius:2px; display:block; }
    .product-thumb-placeholder { width:48px; height:60px; background:var(--gray-mid); border-radius:2px; display:flex; align-items:center; justify-content:center; font-size:.55rem; color:var(--muted); font-weight:700; }
    .badge { display:inline-block; padding:2px 8px; border-radius:2px; font-size:.55rem; font-weight:900; text-transform:uppercase; letter-spacing:.06em; }
    .badge-new { background:var(--red); color:#fff; }
    .badge-sold { background:#111; color:#fff; }
    .badge-avail { background:#dcfce7; color:var(--green); }
    .badge-reserved { background:#fff7ed; color:var(--orange); }
    .badge-pending { background:#fef9c3; color:#854d0e; }
    .badge-completed { background:#dcfce7; color:var(--green); }
    .actions-cell { display:flex; gap:.5rem; align-items:center; flex-wrap:wrap; }

    /* ── FORM / MODAL ── */
    .modal-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,.55);
      backdrop-filter:blur(4px); z-index:200;
      display:none; align-items:center; justify-content:center; padding:1rem;
    }
    .modal-overlay.active { display:flex; }
    .modal {
      background:#fff; width:100%; max-width:640px; max-height:92vh;
      overflow-y:auto; padding:2.5rem; position:relative;
      animation:slideUp .3s var(--ease);
    }
    @keyframes slideUp { from{transform:translateY(30px);opacity:0} to{transform:translateY(0);opacity:1} }
    .modal-title { font-size:1.1rem; font-weight:900; text-transform:uppercase; letter-spacing:-.02em; margin-bottom:2rem; }
    .modal-close {
      position:absolute; top:1rem; right:1rem; background:none; border:none;
      font-size:1.5rem; cursor:pointer; color:var(--muted); line-height:1;
    }
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
    .form-full { grid-column:1/-1; }
    .form-group { display:flex; flex-direction:column; gap:.3rem; }
    .form-group label { font-size:.6rem; font-weight:800; text-transform:uppercase; letter-spacing:.1em; }
    .form-group input, .form-group select, .form-group textarea {
      padding:.65rem .75rem; border:1.5px solid var(--gray-mid); font-family:'Inter',sans-serif;
      font-size:.82rem; outline:none; transition:border-color .2s; resize:none;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color:var(--black); }
    .sizes-grid { display:flex; gap:.5rem; flex-wrap:wrap; margin-top:.3rem; }
    .size-toggle {
      padding:.4rem .9rem; border:1.5px solid var(--gray-mid); background:#fff;
      font-size:.65rem; font-weight:800; cursor:pointer; transition:all .15s;
      font-family:'Inter',sans-serif; text-transform:uppercase;
    }
    .size-toggle.selected { background:var(--black); color:#fff; border-color:var(--black); }
    .modal-footer { display:flex; gap:1rem; justify-content:flex-end; margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--gray-mid); }

    /* ── IMAGE UPLOAD ── */
    .img-upload-zone {
      border:2px dashed var(--gray-mid); padding:2rem; text-align:center;
      cursor:pointer; transition:border-color .2s; position:relative;
    }
    .img-upload-zone:hover { border-color:var(--black); }
    .img-upload-zone input[type=file] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
    .img-upload-zone p { font-size:.7rem; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.1em; }
    .img-preview { display:flex; gap:.5rem; flex-wrap:wrap; margin-top:.8rem; }
    .img-preview-item { position:relative; }
    .img-preview-item img { width:80px; height:100px; object-fit:cover; border-radius:2px; }
    .img-preview-item button { position:absolute; top:-5px; right:-5px; background:var(--red); color:#fff; border:none; width:18px; height:18px; border-radius:50%; font-size:.7rem; cursor:pointer; line-height:1; }

    /* ── ORDERS ── */
    .order-card {
      background:#fff; border:1px solid rgba(0,0,0,.07); padding:1.5rem;
      margin-bottom:1rem;
    }
    .order-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:1rem; flex-wrap:wrap; gap:.5rem; }
    .order-id { font-size:.78rem; font-weight:900; letter-spacing:.05em; }
    .order-date { font-size:.62rem; color:var(--muted); font-weight:600; }
    .order-items { font-size:.78rem; margin-bottom:.8rem; color:var(--muted); }
    .order-total { font-size:1rem; font-weight:900; }
    .order-customer { font-size:.72rem; color:var(--muted); line-height:1.8; }
    .order-actions { display:flex; gap:.5rem; margin-top:1rem; flex-wrap:wrap; }
    .btn-wa {
      background:#25D366; color:#fff; border:none;
      padding:.5rem 1rem; font-size:.62rem; font-weight:800; text-transform:uppercase;
      letter-spacing:.08em; cursor:pointer; font-family:'Inter',sans-serif;
    }
    .orders-filter { display:flex; gap:.5rem; margin-bottom:1.5rem; flex-wrap:wrap; }
    .filter-chip {
      padding:.35rem .9rem; border:1.5px solid var(--gray-mid); background:#fff;
      font-size:.6rem; font-weight:800; text-transform:uppercase; letter-spacing:.08em;
      cursor:pointer; transition:all .15s; font-family:'Inter',sans-serif;
    }
    .filter-chip.active { background:var(--black); color:#fff; border-color:var(--black); }

    /* ── EMPTY / LOADING ── */
    .empty-state { text-align:center; padding:4rem 2rem; color:var(--muted); }
    .empty-state p { font-size:.78rem; font-weight:700; text-transform:uppercase; letter-spacing:.1em; }
    .spinner { display:inline-block; width:20px; height:20px; border:2px solid var(--gray-mid); border-top-color:var(--black); border-radius:50%; animation:spin .7s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }

    /* ── TOAST ── */
    #toast {
      position:fixed; bottom:2rem; right:2rem; background:var(--black); color:#fff;
      padding:.9rem 1.8rem; font-size:.72rem; font-weight:800; text-transform:uppercase;
      letter-spacing:.1em; z-index:300; display:none; border-left:3px solid var(--red);
      animation:slideInToast .3s ease-out;
    }
    @keyframes slideInToast { from{transform:translateY(100%);opacity:0} to{transform:translateY(0);opacity:1} }

    @media (max-width:768px) {
      .admin-content { padding:1rem; }
      .form-grid { grid-template-columns:1fr; }
      .modal { padding:1.5rem; }
      .admin-header { padding:.8rem 1rem; }
      .admin-nav { padding:0 1rem; overflow-x:auto; }
      .tab-btn { padding:.8rem 1rem; white-space:nowrap; }
    }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════════
     LOGIN SCREEN
══════════════════════════════════════════ -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">ZYSKN</div>
    <div class="login-sub">Panel de Administración</div>
    <label>Email</label>
    <input type="email" id="loginEmail" placeholder="tu@email.com" autocomplete="email">
    <label>Contraseña</label>
    <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password"
           onkeydown="if(event.key==='Enter') doLogin()">
    <button class="btn-login" onclick="doLogin()">Ingresar</button>
    <div id="loginError">Email o contraseña incorrectos</div>
  </div>
</div>

<!-- ══════════════════════════════════════════
     ADMIN APP
══════════════════════════════════════════ -->
<div id="adminApp">

  <!-- Header -->
  <div class="admin-header">
    <div class="admin-logo">ZYSKN <span>Admin Panel</span></div>
    <div class="header-right">
      <span class="admin-user" id="adminUserEmail"></span>
      <button class="btn-logout" onclick="doLogout()">Salir</button>
    </div>
  </div>

  <!-- Tabs -->
  <div class="admin-nav">
    <button class="tab-btn active" onclick="switchTab('dashboard')">Dashboard</button>
    <button class="tab-btn" onclick="switchTab('products')">Productos</button>
    <button class="tab-btn" onclick="switchTab('orders')">Pedidos</button>
  </div>

  <!-- Content -->
  <div class="admin-content">

    <!-- ── DASHBOARD ── -->
    <div id="tab-dashboard">
      <div class="stats-row" id="statsRow">
        <div class="stat-card"><div class="stat-num" id="st-total">–</div><div class="stat-label">Productos</div></div>
        <div class="stat-card green"><div class="stat-num" id="st-avail">–</div><div class="stat-label">Disponibles</div></div>
        <div class="stat-card red"><div class="stat-num" id="st-sold">–</div><div class="stat-label">Vendidos</div></div>
        <div class="stat-card orange"><div class="stat-num" id="st-res">–</div><div class="stat-label">Reservados ahora</div></div>
        <div class="stat-card"><div class="stat-num" id="st-orders">–</div><div class="stat-label">Pedidos totales</div></div>
        <div class="stat-card green"><div class="stat-num" id="st-revenue">–</div><div class="stat-label">Ingresos totales</div></div>
      </div>
      <div style="background:#fff;padding:1.5rem;border:1px solid rgba(0,0,0,.06);">
        <p style="font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:1rem;">Pedidos recientes</p>
        <div id="recentOrders"></div>
      </div>
    </div>

    <!-- ── PRODUCTS ── -->
    <div id="tab-products" style="display:none;">
      <div class="section-hdr">
        <h2>Productos (<span id="productCount">0</span>)</h2>
        <button class="btn-primary" onclick="openProductModal()">+ Agregar Producto</button>
      </div>
      <!-- Filtros rápidos -->
      <div class="orders-filter" style="margin-bottom:1.5rem;">
        <button class="filter-chip active" onclick="filterProductsAdmin('all',this)">Todos</button>
        <button class="filter-chip" onclick="filterProductsAdmin('available',this)">Disponibles</button>
        <button class="filter-chip" onclick="filterProductsAdmin('sold',this)">Vendidos</button>
        <button class="filter-chip" onclick="filterProductsAdmin('new',this)">Nuevos</button>
        <button class="filter-chip" onclick="filterProductsAdmin('reserved',this)">Reservados</button>
      </div>
      <div style="overflow-x:auto;">
        <table class="product-table">
          <thead>
            <tr>
              <th>Foto</th>
              <th>Nombre</th>
              <th>Precio</th>
              <th>Categoría</th>
              <th>Talles</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="productsTableBody"></tbody>
        </table>
      </div>
    </div>

    <!-- ── ORDERS ── -->
    <div id="tab-orders" style="display:none;">
      <div class="section-hdr">
        <h2>Pedidos</h2>
        <div style="display:flex;gap:.5rem;">
          <button class="btn-outline" onclick="loadOrders()">↻ Actualizar</button>
        </div>
      </div>
      <div class="orders-filter">
        <button class="filter-chip active" onclick="filterOrders('all',this)">Todos</button>
        <button class="filter-chip" onclick="filterOrders('pending',this)">Pendientes</button>
        <button class="filter-chip" onclick="filterOrders('completed',this)">Completados</button>
        <button class="filter-chip" onclick="filterOrders('cancelled',this)">Cancelados</button>
      </div>
      <div id="ordersContainer"></div>
    </div>

  </div><!-- /admin-content -->
</div><!-- /adminApp -->

<!-- ══════════════════════════════════════════
     MODAL PRODUCTO
══════════════════════════════════════════ -->
<div class="modal-overlay" id="productModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('productModal')">×</button>
    <div class="modal-title" id="modalTitle">Nuevo Producto</div>
    <div class="form-grid">
      <div class="form-group form-full">
        <label>Nombre del producto *</label>
        <input type="text" id="f-name" placeholder="Ej: Columbia Fleece 90s Navy">
      </div>
      <div class="form-group">
        <label>Precio (ARS) *</label>
        <input type="number" id="f-price" placeholder="15000">
      </div>
      <div class="form-group">
        <label>Estado de la prenda</label>
        <select id="f-estado">
          <option>10/10</option>
          <option>9/10</option>
          <option>8/10</option>
        </select>
      </div>
      <div class="form-group">
        <label>Categoría *</label>
        <select id="f-category">
          <option value="">Seleccionar...</option>
          <option value="remeras">Remeras</option>
          <option value="hoodies">Hoodies</option>
          <option value="polares">Polares</option>
          <option value="sweaters">Sweaters</option>
          <option value="camisas">Camisas</option>
          <option value="camperas">Camperas</option>
          <option value="rompevientos">Rompevientos</option>
          <option value="Casacas deportivas">Casacas Deportivas</option>
          <option value="chombas">Chombas</option>
          <option value="pantalones">Pantalones Cargo</option>
          <option value="jeans">Jeans</option>
          <option value="bermudas">Bermudas Cargo</option>
          <option value="shorts">Shorts</option>
        </select>
      </div>
      <div class="form-group">
        <label>Sección</label>
        <select id="f-section">
          <option value="arriba">Arriba</option>
          <option value="abajo">Abajo</option>
          <option value="accesorios">Accesorios</option>
        </select>
      </div>
      <div class="form-group">
        <label>Talle etiqueta</label>
        <input type="text" id="f-talle" placeholder="Ej: L / XL US">
      </div>
      <div class="form-group form-full">
        <label>Medidas exactas</label>
        <input type="text" id="f-medidas" placeholder="Ej: Pecho 58cm · Largo 72cm · Manga 65cm">
      </div>
      <div class="form-group form-full">
        <label>Talles disponibles</label>
        <div class="sizes-grid" id="sizesGrid">
          <button class="size-toggle" onclick="toggleSize(this,'XS')">XS</button>
          <button class="size-toggle" onclick="toggleSize(this,'S')">S</button>
          <button class="size-toggle" onclick="toggleSize(this,'M')">M</button>
          <button class="size-toggle" onclick="toggleSize(this,'L')">L</button>
          <button class="size-toggle" onclick="toggleSize(this,'XL')">XL</button>
          <button class="size-toggle" onclick="toggleSize(this,'XXL')">XXL</button>
          <button class="size-toggle" onclick="toggleSize(this,'XXXL')">XXXL</button>
          <button class="size-toggle" onclick="toggleSize(this,'Único')">Único</button>
        </div>
      </div>
      <div class="form-group form-full">
        <label>Descripción / Detalles</label>
        <textarea id="f-desc" rows="3" placeholder="Detalles adicionales, historia de la prenda, materiales..."></textarea>
      </div>
      <div class="form-group form-full">
        <label>Foto principal (URL)</label>
        <input type="url" id="f-img" placeholder="https://... (subí la imagen a Supabase Storage o Imgur)">
      </div>
      <div class="form-group form-full">
        <label>Foto secundaria (URL, opcional)</label>
        <input type="url" id="f-img2" placeholder="https://...">
      </div>
      <div class="form-group" style="flex-direction:row;align-items:center;gap:.75rem;">
        <input type="checkbox" id="f-new" style="width:18px;height:18px;cursor:pointer;">
        <label for="f-new" style="cursor:pointer;">Marcar como NUEVO</label>
      </div>
      <div class="form-group" style="flex-direction:row;align-items:center;gap:.75rem;">
        <input type="checkbox" id="f-sold" style="width:18px;height:18px;cursor:pointer;">
        <label for="f-sold" style="cursor:pointer;">Marcar como VENDIDO</label>
      </div>
    </div>
    <!-- Preview imágenes -->
    <div id="imgPreviewArea" style="margin-top:1rem;display:flex;gap:.5rem;flex-wrap:wrap;"></div>
    <div class="modal-footer">
      <button class="btn-outline" onclick="closeModal('productModal')">Cancelar</button>
      <button class="btn-primary" onclick="saveProduct()" id="saveProductBtn">Guardar Producto</button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════
     CONFIRM MODAL
══════════════════════════════════════════ -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal" style="max-width:400px;">
    <div class="modal-title" id="confirmTitle">Confirmar</div>
    <p id="confirmMsg" style="font-size:.85rem;color:var(--muted);margin-bottom:2rem;line-height:1.6;"></p>
    <div class="modal-footer" style="margin-top:0;padding-top:0;border:none;">
      <button class="btn-outline" onclick="closeModal('confirmModal')">Cancelar</button>
      <button class="btn-primary btn-danger" onclick="confirmAction()" id="confirmBtn">Confirmar</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- ══════════════════════════════════════════
     SUPABASE SDK
══════════════════════════════════════════ -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ────────────────────────────────────────────
   CONFIG — Mismas credenciales que tu tienda
──────────────────────────────────────────── */
const SUPABASE_URL  = 'https://iifrudupaxcahnopxqcb.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlpZnJ1ZHVwYXhjYWhub3B4cWNiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0NDUyNjgsImV4cCI6MjA5NzAyMTI2OH0.2tTm-ko4n15HctHX40w4_OjBlajaxYZXaqhNamGCD8o';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

/* ────────────────────────────────────────────
   STATE
──────────────────────────────────────────── */
let allAdminProducts = [];
let allOrders = [];
let allReservations = [];
let editingProductId = null;
let confirmCallback = null;
let ordersFilter = 'all';
let productsAdminFilter = 'all';

/* ────────────────────────────────────────────
   AUTH
──────────────────────────────────────────── */
sb.auth.onAuthStateChange((event, session) => {
  if (session) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminApp').style.display = 'block';
    document.getElementById('adminUserEmail').textContent = session.user.email;
    initAdmin();
  } else {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('adminApp').style.display = 'none';
  }
});

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginError');
  errEl.style.display = 'none';
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) { errEl.style.display = 'block'; }
}

async function doLogout() {
  await sb.auth.signOut();
}

/* ────────────────────────────────────────────
   INIT
──────────────────────────────────────────── */
async function initAdmin() {
  await Promise.all([loadAdminProducts(), loadOrders(), loadReservations()]);
  renderDashboard();
}

/* ────────────────────────────────────────────
   TABS
──────────────────────────────────────────── */
function switchTab(tab) {
  ['dashboard','products','orders'].forEach(t => {
    document.getElementById('tab-' + t).style.display = t === tab ? 'block' : 'none';
  });
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    const tabs = ['dashboard','products','orders'];
    btn.classList.toggle('active', tabs[i] === tab);
  });
  if (tab === 'products') renderProductsTable();
  if (tab === 'orders') renderOrders();
}

/* ────────────────────────────────────────────
   PRODUCTS CRUD
──────────────────────────────────────────── */
async function loadAdminProducts() {
  const { data } = await sb.from('products').select('*').order('created_at', { ascending: false });
  allAdminProducts = data || [];
  document.getElementById('productCount').textContent = allAdminProducts.length;
}

async function loadReservations() {
  // Limpiar vencidas primero
  await sb.from('reservations').delete().lt('expires_at', new Date().toISOString());
  const { data } = await sb.from('reservations').select('*');
  allReservations = data || [];
}

function isProductReserved(productId) {
  return allReservations.some(r => r.product_id === productId);
}

function filterProductsAdmin(filter, btn) {
  productsAdminFilter = filter;
  document.querySelectorAll('#tab-products .filter-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderProductsTable();
}

function getFilteredAdminProducts() {
  switch (productsAdminFilter) {
    case 'available': return allAdminProducts.filter(p => !p.is_sold && !isProductReserved(p.id));
    case 'sold':      return allAdminProducts.filter(p => p.is_sold);
    case 'new':       return allAdminProducts.filter(p => p.is_new);
    case 'reserved':  return allAdminProducts.filter(p => isProductReserved(p.id));
    default:          return allAdminProducts;
  }
}

function renderProductsTable() {
  const list = getFilteredAdminProducts();
  const tbody = document.getElementById('productsTableBody');
  if (!list.length) {
    tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><p>Sin productos en esta categoría</p></div></td></tr>`;
    return;
  }
  tbody.innerHTML = list.map(p => {
    const reserved = isProductReserved(p.id);
    const statusBadge = p.is_sold
      ? '<span class="badge badge-sold">Vendido</span>'
      : reserved
        ? '<span class="badge badge-reserved">Reservado</span>'
        : '<span class="badge badge-avail">Disponible</span>';
    const newBadge = p.is_new ? '<span class="badge badge-new" style="margin-left:4px;">NEW</span>' : '';

    return `
    <tr>
      <td>${p.img
        ? `<img src="${p.img}" class="product-thumb" alt="${p.name}" onerror="this.parentElement.innerHTML='<div class=\\'product-thumb-placeholder\\'>NO IMG</div>'">`
        : '<div class="product-thumb-placeholder">NO IMG</div>'
      }</td>
      <td><strong style="font-size:.8rem;">${p.name}</strong></td>
      <td style="font-weight:800;">$${Number(p.price).toLocaleString('es-AR')}</td>
      <td style="font-size:.72rem;color:var(--muted);text-transform:capitalize;">${p.category || '–'}</td>
      <td style="font-size:.72rem;">${(p.sizes || []).join(' · ') || '–'}</td>
      <td>${statusBadge}${newBadge}</td>
      <td>
        <div class="actions-cell">
          <button class="btn-outline" style="font-size:.55rem;padding:.35rem .7rem;" onclick="openProductModal('${p.id}')">Editar</button>
          <button class="btn-outline" style="font-size:.55rem;padding:.35rem .7rem;" onclick="toggleSold('${p.id}',${p.is_sold})">
            ${p.is_sold ? '✓ Disponible' : '✗ Vendido'}
          </button>
          <button class="btn-outline" style="font-size:.55rem;padding:.35rem .7rem;color:var(--red);border-color:var(--red);" onclick="confirmDelete('${p.id}','${p.name.replace(/'/g,"\\'")}')">Eliminar</button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

/* ── MODAL PRODUCTO ── */
function openProductModal(id = null) {
  editingProductId = id;
  const modal = document.getElementById('productModal');
  const title = document.getElementById('modalTitle');

  // Reset form
  ['f-name','f-price','f-talle','f-medidas','f-desc','f-img','f-img2'].forEach(fid => {
    document.getElementById(fid).value = '';
  });
  document.getElementById('f-category').value = '';
  document.getElementById('f-section').value = 'arriba';
  document.getElementById('f-estado').value = '10/10';
  document.getElementById('f-new').checked = true;
  document.getElementById('f-sold').checked = false;
  document.querySelectorAll('.size-toggle').forEach(b => b.classList.remove('selected'));
  document.getElementById('imgPreviewArea').innerHTML = '';

  if (id) {
    title.textContent = 'Editar Producto';
    const p = allAdminProducts.find(x => x.id === id);
    if (p) {
      document.getElementById('f-name').value = p.name || '';
      document.getElementById('f-price').value = p.price || '';
      document.getElementById('f-category').value = p.category || '';
      document.getElementById('f-section').value = p.section || 'arriba';
      document.getElementById('f-estado').value = p.estado || '10/10';
      document.getElementById('f-talle').value = p.talle || '';
      document.getElementById('f-medidas').value = p.medidas || '';
      document.getElementById('f-desc').value = p.description || '';
      document.getElementById('f-img').value = p.img || '';
      document.getElementById('f-img2').value = p.img2 || '';
      document.getElementById('f-new').checked = !!p.is_new;
      document.getElementById('f-sold').checked = !!p.is_sold;
      (p.sizes || []).forEach(s => {
        document.querySelectorAll('.size-toggle').forEach(b => {
          if (b.textContent === s) b.classList.add('selected');
        });
      });
      updateImgPreview();
    }
  } else {
    title.textContent = 'Nuevo Producto';
  }

  modal.classList.add('active');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('active');
}

function toggleSize(btn, size) {
  btn.classList.toggle('selected');
}

function updateImgPreview() {
  const area = document.getElementById('imgPreviewArea');
  const urls = [document.getElementById('f-img').value, document.getElementById('f-img2').value].filter(Boolean);
  area.innerHTML = urls.map(url =>
    `<div class="img-preview-item"><img src="${url}" alt="preview" onerror="this.style.display='none'"></div>`
  ).join('');
}

document.getElementById('f-img').addEventListener('input', updateImgPreview);
document.getElementById('f-img2').addEventListener('input', updateImgPreview);

async function saveProduct() {
  const btn = document.getElementById('saveProductBtn');
  const name = document.getElementById('f-name').value.trim();
  const price = parseFloat(document.getElementById('f-price').value);
  const category = document.getElementById('f-category').value;

  if (!name || !price || !category) {
    showToast('Completá Nombre, Precio y Categoría'); return;
  }

  const sizes = [...document.querySelectorAll('.size-toggle.selected')].map(b => b.textContent);

  const payload = {
    name,
    price,
    category,
    section: document.getElementById('f-section').value,
    estado: document.getElementById('f-estado').value,
    talle: document.getElementById('f-talle').value.trim(),
    medidas: document.getElementById('f-medidas').value.trim(),
    description: document.getElementById('f-desc').value.trim(),
    img: document.getElementById('f-img').value.trim() || null,
    img2: document.getElementById('f-img2').value.trim() || null,
    is_new: document.getElementById('f-new').checked,
    is_sold: document.getElementById('f-sold').checked,
    sizes,
  };

  btn.disabled = true; btn.textContent = 'Guardando...';

  let error;
  if (editingProductId) {
    ({ error } = await sb.from('products').update(payload).eq('id', editingProductId));
  } else {
    ({ error } = await sb.from('products').insert(payload));
  }

  btn.disabled = false; btn.textContent = 'Guardar Producto';

  if (error) { showToast('Error: ' + error.message); return; }

  showToast(editingProductId ? 'Producto actualizado ✓' : 'Producto creado ✓');
  closeModal('productModal');
  await loadAdminProducts();
  renderProductsTable();
  renderDashboard();
}

async function toggleSold(id, currentSold) {
  await sb.from('products').update({ is_sold: !currentSold }).eq('id', id);
  await loadAdminProducts();
  renderProductsTable();
  renderDashboard();
  showToast(!currentSold ? 'Marcado como VENDIDO' : 'Marcado como DISPONIBLE');
}

function confirmDelete(id, name) {
  document.getElementById('confirmTitle').textContent = 'Eliminar Producto';
  document.getElementById('confirmMsg').textContent = `¿Estás seguro que querés eliminar "${name}"? Esta acción no se puede deshacer.`;
  confirmCallback = async () => {
    await sb.from('products').delete().eq('id', id);
    closeModal('confirmModal');
    await loadAdminProducts();
    renderProductsTable();
    renderDashboard();
    showToast('Producto eliminado');
  };
  document.getElementById('confirmModal').classList.add('active');
}

function confirmAction() {
  if (confirmCallback) confirmCallback();
}

/* ────────────────────────────────────────────
   ORDERS
──────────────────────────────────────────── */
async function loadOrders() {
  const { data } = await sb.from('orders').select('*').order('created_at', { ascending: false });
  allOrders = data || [];
}

function filterOrders(filter, btn) {
  ordersFilter = filter;
  document.querySelectorAll('#tab-orders .filter-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderOrders();
}

function renderOrders() {
  const list = ordersFilter === 'all'
    ? allOrders
    : allOrders.filter(o => o.status === ordersFilter);

  const container = document.getElementById('ordersContainer');
  if (!list.length) {
    container.innerHTML = '<div class="empty-state"><p>No hay pedidos en esta categoría</p></div>';
    return;
  }

  container.innerHTML = list.map(order => {
    const date = new Date(order.created_at).toLocaleDateString('es-AR', {
      day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'
    });
    const items = (order.items || []);
    const itemsText = items.map(i => `${i.name} (${i.size})`).join(', ');

    const statusBadge = {
      pending:   '<span class="badge badge-pending">Pendiente</span>',
      completed: '<span class="badge badge-completed">Completado</span>',
      cancelled: '<span class="badge badge-sold">Cancelado</span>',
    }[order.status] || '<span class="badge">–</span>';

    // WhatsApp message recap
    const waText = encodeURIComponent(
      `Hola! Sigo con el pedido *${order.order_id}*. ¿Cómo quedamos?`
    );

    return `
    <div class="order-card">
      <div class="order-header">
        <div>
          <div class="order-id">${order.order_id}</div>
          <div class="order-date">${date}</div>
        </div>
        <div style="display:flex;gap:.5rem;align-items:center;">
          ${statusBadge}
          <select onchange="updateOrderStatus('${order.id}',this.value)"
            style="font-size:.6rem;font-weight:800;text-transform:uppercase;padding:.3rem .6rem;border:1.5px solid var(--gray-mid);font-family:'Inter',sans-serif;cursor:pointer;outline:none;">
            <option value="pending"   ${order.status==='pending'   ?'selected':''}>Pendiente</option>
            <option value="completed" ${order.status==='completed' ?'selected':''}>Completado</option>
            <option value="cancelled" ${order.status==='cancelled' ?'selected':''}>Cancelado</option>
          </select>
        </div>
      </div>
      <div class="order-items">${itemsText || '–'}</div>
      <div class="order-total">$${Number(order.total || 0).toLocaleString('es-AR')}</div>
      <div class="order-customer" style="margin-top:.6rem;">
        <strong>${order.customer_name || '–'}</strong> · DNI ${order.customer_dni || '–'} · ${order.customer_phone || '–'}<br>
        ${order.customer_location || ''} · ${order.customer_shipping || ''}
      </div>
      <div class="order-actions">
        <a href="https://wa.me/${order.customer_phone ? order.customer_phone.replace(/\D/g,'') : '5493544631553'}?text=${waText}" target="_blank">
          <button class="btn-wa">📲 Contactar por WhatsApp</button>
        </a>
      </div>
    </div>`;
  }).join('');
}

async function updateOrderStatus(id, status) {
  await sb.from('orders').update({ status }).eq('id', id);
  await loadOrders();
  renderOrders();
  showToast('Estado actualizado: ' + status.toUpperCase());
}

/* ────────────────────────────────────────────
   DASHBOARD
──────────────────────────────────────────── */
function renderDashboard() {
  const total   = allAdminProducts.length;
  const sold    = allAdminProducts.filter(p => p.is_sold).length;
  const avail   = total - sold;
  const res     = allReservations.length;
  const orders  = allOrders.length;
  const revenue = allOrders
    .filter(o => o.status === 'completed')
    .reduce((s, o) => s + Number(o.total || 0), 0);

  document.getElementById('st-total').textContent   = total;
  document.getElementById('st-avail').textContent   = avail;
  document.getElementById('st-sold').textContent    = sold;
  document.getElementById('st-res').textContent     = res;
  document.getElementById('st-orders').textContent  = orders;
  document.getElementById('st-revenue').textContent = '$' + revenue.toLocaleString('es-AR');

  // Pedidos recientes (últimos 5)
  const recent = allOrders.slice(0, 5);
  document.getElementById('recentOrders').innerHTML = recent.length ? recent.map(o => {
    const date = new Date(o.created_at).toLocaleDateString('es-AR');
    const statusColor = { pending:'#854d0e', completed:'var(--green)', cancelled:'var(--red)' }[o.status] || '#000';
    return `<div style="display:flex;justify-content:space-between;padding:.6rem 0;border-bottom:1px solid rgba(0,0,0,.05);font-size:.75rem;">
      <div><strong>${o.order_id}</strong> — ${o.customer_name || '–'}</div>
      <div style="display:flex;gap:1rem;align-items:center;">
        <span style="font-weight:700;">$${Number(o.total||0).toLocaleString('es-AR')}</span>
        <span style="font-size:.6rem;font-weight:800;text-transform:uppercase;color:${statusColor};">${o.status}</span>
        <span style="font-size:.62rem;color:var(--muted);">${date}</span>
      </div>
    </div>`;
  }).join('')
  : '<p style="font-size:.75rem;color:var(--muted);">No hay pedidos aún.</p>';
}

/* ────────────────────────────────────────────
   TOAST
──────────────────────────────────────────── */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.style.display = 'none', 3500);
}

/* Cerrar modal al hacer clic fuera */
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => {
    if (e.target === overlay) overlay.classList.remove('active');
  });
});
</script>
</body>
</html>
