<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cambiar contraseña | ZYSKN</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Inter, sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .box {
      background: white;
      padding: 2rem;
      width: 100%;
      max-width: 400px;
      border-radius: 8px;
      box-shadow: 0 10px 30px rgba(0,0,0,.1);
    }
    h1 {
      font-size: 1.4rem;
      margin-bottom: 1rem;
      text-transform: uppercase;
    }
    input {
      width: 100%;
      padding: .9rem;
      margin-bottom: 1rem;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: .9rem;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 1rem;
      background: black;
      color: white;
      border: none;
      border-radius: 4px;
      font-weight: 700;
      cursor: pointer;
      text-transform: uppercase;
    }
    .msg {
      margin-top: 1rem;
      font-size: .85rem;
      text-align: center;
    }
    .error { color: #b00020; }
    .success { color: #0a7d2c; }
  </style>
</head>
<body>

  <div class="box">
    <h1>Nueva contraseña</h1>

    <input type="password" id="newPassword" placeholder="Nueva contraseña" />
    <input type="password" id="confirmPassword" placeholder="Confirmar contraseña" />

    <button onclick="updatePassword()">Cambiar contraseña</button>

    <div id="message" class="msg"></div>
  </div>

  <script>
    const supabaseUrl = 'TU_SUPABASE_URL';
    const supabaseKey = 'TU_SUPABASE_ANON_KEY';

    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    async function updatePassword() {
      const password = document.getElementById('newPassword').value;
      const confirm = document.getElementById('confirmPassword').value;
      const message = document.getElementById('message');

      message.textContent = '';
      message.className = 'msg';

      if (password.length < 6) {
        message.textContent = 'La contraseña debe tener al menos 6 caracteres';
        message.classList.add('error');
        return;
      }

      if (password !== confirm) {
        message.textContent = 'Las contraseñas no coinciden';
        message.classList.add('error');
        return;
      }

      const { error } = await supabase.auth.updateUser({
        password: password
      });

      if (error) {
        message.textContent = error.message;
        message.classList.add('error');
      } else {
        message.textContent = 'Contraseña actualizada correctamente';
        message.classList.add('success');

        setTimeout(() => {
          window.location.href = '/';
        }, 2000);
      }
    }
  </script>

</body>
</html>
