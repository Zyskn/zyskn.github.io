name: Deploy ZYSKN

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'   # sube tu index.html y todo lo demás

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
