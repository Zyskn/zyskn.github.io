<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Página no encontrada | ZYSKN</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="/favicon.png">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:'Inter',sans-serif;
      background:#000;
      color:#fff;
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      overflow:hidden;
    }
    body::before{
      content:'';
      position:absolute;
      inset:0;
      background:radial-gradient(ellipse 60vw 50vh at 50% 100%,rgba(163,0,0,0.22) 0%,transparent 70%);
      pointer-events:none;
    }
    .wrap{position:relative;z-index:1;padding:1.5rem;max-width:480px}
    .logo{
      font-size:1.8rem;
      font-weight:900;
      letter-spacing:-.04em;
      margin-bottom:.8rem;
      cursor:pointer;
      color:#fff; /* <- TODO BLANCO */
      transition:all .3s ease;
    }
    .logo span{color:inherit;transition:inherit} /* hereda del padre */
    
    /* EFECTO ROJO EN TODO EL LOGO */
    .logo:hover{
      color:#A30000;
      transform:scale(1.03);
      text-shadow:0 0 18px rgba(163,0,0,.7);
    }
    
    h1{
      font-size:clamp(2.8rem,10vw,5.5rem);
      font-weight:900;
      line-height:.9;
      letter-spacing:-.04em;
      margin-bottom:.6rem;
    }
    p{
      font-size:.72rem;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:.1em;
      color:#777;
      margin-bottom:2rem;
      line-height:1.5;
    }
    .btn{
      display:inline-block;
      padding:.75rem 1.8rem;
      background:#fff;
      color:#000;
      text-decoration:none;
      font-size:.7rem;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.1em;
      border:1.5px solid #fff;
      transition:all .25s ease;
    }
    .btn:hover{background:transparent;color:#fff}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo" onclick="location.href='/'">ZYS<span>KN</span></div>
    <h1>404</h1>
    <p>Esta pieza no existe.<br>Volvé al drop.</p>
    <a href="/" class="btn">Volver a la tienda</a>
  </div>
  <script>
    setTimeout(()=>{window.location.href='/'}, 8000);
  </script>
</body>
</html>
