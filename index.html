<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZYSKN ★ | Curated Vintage & Streetwear</title>

    <meta name="description" content="ZYSKN ★ - Curated Vintage & Streetwear. No Restocks. Encontrá piezas únicas seleccionadas a mano. Envíos a todo el país.">
    <meta name="keywords" content="ZYSKN, ZYSKN vintage, streetwear argentina, ropa vintage, curated vintage, 1 of 1, moda urbana">
    <meta name="author" content="ZYSKN">
    <meta name="robots" content="index, follow">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://zyskn.github.io/">
    <meta property="og:title" content="ZYSKN ★ | Curated Vintage & Streetwear">
    <meta property="og:description" content="Piezas únicas de colección. Streetwear & Vintage seleccionado.">
    <meta property="og:image" content="https://i.imgur.com/AoRv9TN.png">

    <link rel="icon" type="image/png" href="https://i.imgur.com/AoRv9TN.png">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

        :root {
            --accent: #000;
            --gray-bg: #F5F5F5;
            --text-muted: #666666;
            --blue: #3B82F6;
            --blue-hover: #2563EB;
            --red: #EF4444;
            --red-hover: #DC2626;
            --whatsapp: #25D366;
            --instagram: #E4405F;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --container-max: 1400px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background: #fff;
            color: #000;
            font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            line-height: 1.5;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        .grain {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.03;
            pointer-events: none;
            z-index: 9999;
        }

        .container {
            max-width: var(--container-max);
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Header */
        header {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 1000;
            border-bottom: 1px solid #f0f0f0;
            padding: 24px 0;
            transition: var(--transition);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-wrap {
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }

        .logo {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: -1px;
            text-transform: uppercase;
            line-height: 1;
        }

        .logo-slogan {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            margin-top: 4px;
            letter-spacing: 0.5px;
        }

        .nav-main {
            display: flex;
            gap: 32px;
            align-items: center;
        }

        .nav-link {
            background: none;
            border: none;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            opacity: 0.42;
            transition: var(--transition);
        }

        .nav-link:hover, .nav-link.active {
            opacity: 1;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            position: relative;
        }

        .icon-btn svg { width: 20px; height: 20px; stroke-width: 2; }

        .search-btn { color: var(--blue); }
        .search-btn:hover { color: var(--blue-hover); transform: scale(1.05); }

        .auth-text {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #000;
            transition: var(--transition);
        }

        .auth-text:hover { color: var(--text-muted); }

        .cart-btn { color: var(--red); }
        .cart-btn:hover { color: var(--red-hover); transform: scale(1.05); }

        .cart-badge {
            position: absolute;
            top: -6px; right: -8px;
            background: #000;
            color: #fff;
            font-size: 9px;
            font-weight: 700;
            min-width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Sub-navigation con Slide Lento */
        .sub-nav-wrapper {
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            background: #fff;
            text-align: center;
        }

        .sub-nav-wrapper.show {
            max-height: 150px;
            margin-bottom: 40px;
        }

        .sub-nav {
            display: none;
            justify-content: center;
            flex-wrap: wrap;
            gap: 24px;
            padding: 30px 0;
            transform: translateY(-20px);
            opacity: 0;
            transition: transform 0.7s ease, opacity 0.7s ease;
        }

        .sub-nav.show {
            display: flex;
            transform: translateY(0);
            opacity: 1;
        }

        /* Hero */
        .hero {
            height: 100vh;
            width: 100%;
            position: relative;
            background: #000;
            margin-bottom: 80px;
            overflow: hidden;
        }

        .hero-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.9;
        }

        .hero-btn-wrap {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .btn-primary {
            background: #000;
            color: #fff;
            border: none;
            height: 52px;
            padding: 0 40px;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-primary:hover {
            background: var(--red-hover);
            transform: scale(0.98);
        }

        /* Shop Grid */
        .section-padding { padding: 80px 0; }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }

        .product-card {
            cursor: pointer;
            position: relative;
            animation: fadeInUp 0.5s ease forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .product-img-wrap {
            position: relative;
            background: var(--gray-bg);
            aspect-ratio: 3/4;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .product-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .product-card:hover .product-img { transform: scale(1.03); }

        .quick-add {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #000;
            color: #fff;
            padding: 12px 24px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0;
            transition: var(--transition);
            pointer-events: none;
        }

        .product-card:hover .quick-add { opacity: 1; }

        .product-name {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }

        .product-price { font-size: 14px; font-weight: 400; color: #000; }

        /* Footer */
        footer {
            background: #fff;
            border-top: 1px solid #f0f0f0;
            padding: 100px 0 40px;
            position: relative;
        }

        .footer-paper-texture {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/paper.png');
            opacity: 0.02;
            pointer-events: none;
        }

        .contact-section { text-align: center; margin-bottom: 80px; }
        .contact-title { font-size: 32px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 48px; }

        .social-links { display: flex; justify-content: center; gap: 60px; }
        .social-item { display: flex; flex-direction: column; align-items: center; gap: 16px; text-decoration: none; color: #000; }

        .social-circle {
            width: 60px; height: 60px;
            background: #000; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            transition: var(--transition);
        }

        .social-circle svg { width: 24px; height: 24px; fill: #fff; }
        .social-item:hover .social-circle { transform: scale(1.1); }
        .social-item.wa:hover .social-circle { background: var(--whatsapp); }
        .social-item.ig:hover .social-circle { background: var(--instagram); }

        .social-label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; }

        .newsletter { max-width: 400px; margin: 0 auto 80px; text-align: center; }
        .newsletter-input {
            width: 100%; background: none; border: none; border-bottom: 1px solid #000;
            padding: 12px 0; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; outline: none;
        }

        .stamped-footer {
            text-align: center; opacity: 0.6; font-size: 11px; font-weight: 700;
            letter-spacing: 3px; text-transform: uppercase; margin-top: 40px;
        }

        .copyright {
            text-align: center;
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 24px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Modals */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.98);
            z-index: 2000;
            overflow-y: auto;
        }
        .modal.active { display: flex; align-items: center; justify-content: center; }
        .modal-content { max-width: 1000px; width: 90%; display: grid; grid-template-columns: 1fr 1fr; gap: 48px; padding: 40px; }
        .size-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 24px 0; }
        .size-btn {
            width: 44px; height: 44px; border: 1px solid #000; background: #fff;
            font-size: 12px; font-weight: 600; cursor: pointer; transition: var(--transition);
        }
        .size-btn.active { background: #000; color: #fff; }

        @media (max-width: 768px) {
            header { padding: 16px 0; }
            .logo { font-size: 22px; }
            .logo-slogan { font-size: 11px; }
            .grid { grid-template-columns: repeat(2, 1fr); gap: 16px; }
            .section-padding { padding: 48px 0; }
            .social-links { gap: 32px; }
            .modal-content { grid-template-columns: 1fr; padding: 20px; }
        }

        .search-overlay {
            position: absolute; top: 100%; right: 0; width: 320px;
            background: #fff; border: 1px solid #f0f0f0; padding: 16px;
            display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .search-overlay.active { display: block; }
    </style>
</head>

    <script>
        const products = [
            {id:'t1', section:'arriba', category:'remeras', name:'VINTAGE TEE 01', price:25000, desc:'90s Cotton Blend. Oversized fit.', img:'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?auto=format&fit=crop&w=900&q=80', sizes:['S','M','L','XL']},
            {id:'t2', section:'arriba', category:'chombas', name:'RETRO POLO', price:32000, desc:'Piqué cotton. Hand-picked vintage.', img:'https://images.unsplash.com/photo-1586363104862-3a5e2ab60d99?auto=format&fit=crop&w=900&q=80', sizes:['M','L']},
            {id:'t3', section:'arriba', category:'casacas', name:'VARSITY JACKET', price:45000, desc:'Classic sports aesthetic.', img:'https://images.unsplash.com/photo-1551028719-00167b16eac5?auto=format&fit=crop&w=900&q=80', sizes:['L','XL']},
            {id:'p1', section:'abajo', category:'pantalones', name:'CARGO PANTS', price:56000, desc:'Heavy duty cotton. Multi-pocket.', img:'https://images.unsplash.com/photo-1473966968600-fa801b869a1a?auto=format&fit=crop&w=900&q=80', sizes:['40','42','44']},
            {id:'p2', section:'abajo', category:'jeans', name:'BAGGY DENIM', price:54000, desc:'Y2K aesthetic. Loose fit.', img:'https://images.unsplash.com/photo-1542272604-787c3835535d?auto=format&fit=crop&w=900&q=80', sizes:['38','40','42']}
        ];

        let cart = JSON.parse(localStorage.getItem('zyskn_cart')) || [];
        let selectedSize = null;

        window.onload = () => {
            renderProducts(products);
            updateCartUI();
        };

        function renderProducts(list) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = list.map(p => `
                <div class="product-card" onclick="openModal('${p.id}')">
                    <div class="product-img-wrap">
                        <img src="${p.img}" alt="${p.name}" class="product-img" loading="lazy">
                        <div class="quick-add">QUICK ADD</div>
                    </div>
                    <div class="product-info">
                        <h3 class="product-name">${p.name}</h3>
                        <p class="product-price">$${p.price.toLocaleString('es-AR')}</p>
                    </div>
                </div>
            `).join('');
        }

        function showMainCategory(section, btn) {
            // Corrección Robusta de Scroll: 
            // Si el usuario está scrolleado más allá de la mitad de la página o en contacto, subimos.
            const threshold = window.innerHeight * 0.5;
            if (window.scrollY > threshold) {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }

            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            btn.classList.add('active');
            
            const wrapper = document.getElementById('sub-nav-wrapper');
            const allSubs = document.querySelectorAll('.sub-nav');
            
            if(section === 'all') {
                wrapper.classList.remove('show');
                renderProducts(products);
                return;
            }

            wrapper.classList.remove('show');
            allSubs.forEach(s => s.classList.remove('show'));

            setTimeout(() => {
                wrapper.classList.add('show');
                const target = document.getElementById(`sub-${section}`);
                target.classList.add('show');
                renderProducts(products.filter(p => p.section === section));
            }, 150);
        }

        function filterProducts(cat, btn) {
            renderProducts(products.filter(p => p.category === cat));
            const grid = document.getElementById('shop');
            if(window.scrollY > grid.offsetTop) {
                scrollToSection('shop');
            }
        }

        function toggleSearch() { document.getElementById('search-overlay').classList.toggle('active'); }
        function searchProducts() {
            const q = document.getElementById('search-input').value.toLowerCase();
            renderProducts(products.filter(p => p.name.toLowerCase().includes(q)));
        }

        function openModal(id) {
            const p = products.find(x => x.id === id);
            document.getElementById('modalImg').src = p.img;
            document.getElementById('modalName').textContent = p.name;
            document.getElementById('modalPrice').textContent = `$${p.price.toLocaleString('es-AR')}`;
            document.getElementById('modalDesc').textContent = p.desc;
            const sizeContainer = document.getElementById('modalSizes');
            sizeContainer.innerHTML = p.sizes.map(s => `<button class="size-btn" onclick="selectSize('${s}', this)">${s}</button>`).join('');
            document.getElementById('addToCartBtn').onclick = () => addToCart(p);
            document.getElementById('productModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function selectSize(s, btn) {
            document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedSize = s;
        }

        function closeModal() {
            document.getElementById('productModal').classList.remove('active');
            document.body.style.overflow = 'auto';
            selectedSize = null;
        }

        function addToCart(p) {
            if(!selectedSize) { alert('SELECT SIZE'); return; }
            cart.push({...p, size: selectedSize});
            localStorage.setItem('zyskn_cart', JSON.stringify(cart));
            updateCartUI();
            closeModal();
        }

        function updateCartUI() { document.getElementById('cart-count').textContent = cart.length; }

        function scrollToSection(id) {
            const element = document.getElementById(id);
            if(!element) return;
            element.scrollIntoView({ behavior: 'smooth' });
        }

        function toggleCart() { alert('CART: ' + cart.length + ' ITEMS.'); }
        function openAuthModal() { alert('LOGIN / REGISTER'); }
    </script>
</body>
</html>
