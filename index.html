<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ZYSKN ★ | Curated Vintage & Streetwear</title>
    <meta name="description" content="ZYSKN ★ - Curated Vintage & Streetwear. No Restocks. Encontrá piezas únicas seleccionadas a mano. Envíos a todo el país.">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://zyskn.github.io/logo.png">
    <link rel="apple-touch-icon" href="https://zyskn.github.io/logo.png">
    
    <!-- Open Graph para WhatsApp / Instagram / Facebook / Discord -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://zyskn.github.io/">
    <meta property="og:title" content="ZYSKN | EST. 2026">
    <meta property="og:description" content="Drop 01 disponible. Córdoba, Argentina.">
    <meta property="og:image" content="https://zyskn.github.io/og-image.png">
    <meta property="og:image:secure_url" content="https://zyskn.github.io/og-image.png">
    <meta property="og:image:type" content="image/png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:site_name" content="ZYSKN">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="ZYSKN | EST. 2026">
    <meta name="twitter:description" content="Drop 01 disponible. Córdoba, Argentina.">
    <meta name="twitter:image" content="https://zyskn.github.io/og-image.png">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        :root { --accent:#000; --gray-bg:#F5F5F5; --text-muted:#666; --blue:#3B82F6; --blue-hover:#2563EB; --red:#EF4444; --red-hover:#DC2626; --whatsapp:#25D366; --instagram:#E4405F; --transition:all 0.3s cubic-bezier(0.4,0,0.2,1); --container-max:1200px; }
        *{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
        html{scroll-behavior:smooth}
        body{background:#FFFFFF;color:#000;font-family:'Inter','Helvetica Neue',Helvetica,Arial,sans-serif;line-height:1.5;overflow-x:hidden}
        .grain{position:fixed;top:0;left:0;width:100%;height:100%;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");opacity:0.03;pointer-events:none;z-index:9999}
        .container{max-width:var(--container-max);margin:0 auto;padding:0 24px}
        header{position:sticky;top:0;background:rgba(255,255,255,0.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);z-index:1000;border-bottom:1px solid #f0f0f0;padding:20px 0;transition:var(--transition)}
        header.scrolled{padding:16px 0}
        .header-content{display:flex;justify-content:space-between;align-items:center}
        .logo-wrap{display:flex;flex-direction:column;cursor:pointer}
        .logo{font-size:28px;font-weight:900;letter-spacing:-1px;text-transform:uppercase;line-height:1}
        .logo-slogan{font-size:11px;font-weight:700;color:var(--text-muted);margin-top:4px;letter-spacing:1.5px}
        .nav-main{display:flex;gap:32px;align-items:center}
        .nav-link{background:none;border:none;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:2px;cursor:pointer;opacity:0.42;transition:var(--transition);color:#000;padding:8px 0;position:relative}
        .nav-link::after{content:'';position:absolute;bottom:0;left:0;width:0;height:2px;background:#000;transition:var(--transition)}
        .nav-link:hover,.nav-link.active{opacity:1}
        .nav-link.active::after,.nav-link:hover::after{width:100%}
        .nav-actions{display:flex;align-items:center;gap:20px;position:relative}
        .icon-btn{background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--transition);position:relative;width:36px;height:36px}
        .icon-btn svg{width:20px;height:20px;stroke-width:2;transition:var(--transition)}
        .search-btn{color:var(--blue)} .search-btn:hover{background:rgba(59,130,246,0.1);color:var(--blue-hover);transform:translateY(-1px)}
        .auth-text{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#000;transition:var(--transition);cursor:pointer;padding:8px 12px}
        .auth-text:hover{background:#f5f5f5;color:var(--text-muted)}
        .cart-btn{color:var(--red)} .cart-btn:hover{background:rgba(239,68,68,0.1);color:var(--red-hover);transform:translateY(-1px)}
        .cart-badge{position:absolute;top:-2px;right:-2px;background:#000;color:#fff;font-size:9px;font-weight:700;min-width:18px;height:18px;display:flex;align-items:center;justify-content:center;transition:var(--transition)}
        .cart-btn:hover .cart-badge{background:var(--red);transform:scale(1.1)}
        .hamburger{display:none;background:none;border:none;cursor:pointer;flex-direction:column;gap:4px;padding:8px}
        .hamburger span{width:22px;height:2px;background:#000;display:block;transition:var(--transition)}
        .mobile-menu{position:fixed;top:0;left:0;width:100%;height:100vh;background:#000;z-index:7000;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:110px;gap:32px;overflow-y:auto;-webkit-overflow-scrolling:touch;transform:translateX(100%);transition:transform 0.4s cubic-bezier(0.77,0,0.175,1)}
        .mobile-menu.active{transform:translateX(0)}
        .mobile-menu button{background:none;border:none;color:#fff;font-size:22px;font-weight:800;text-transform:uppercase;letter-spacing:4px;cursor:pointer;transition:var(--transition);opacity:0.8}
        .mobile-menu button:hover{opacity:1;transform:scale(1.05)}
        .mobile-close{position:absolute;top:24px;right:24px;background:none;border:none;color:#fff;font-size:32px;cursor:pointer;line-height:1}
        .mobile-nav-group{width:100%;display:flex;flex-direction:column;align-items:center}
        .mobile-sub{max-height:0;overflow:hidden;transition:max-height 0.35s cubic-bezier(0.4,0,0.2,1);display:flex;flex-direction:column;gap:18px}
        .mobile-sub.active{max-height:500px;padding-top:8px;padding-bottom:4px}
        .mobile-sub button{font-size:15px!important;letter-spacing:2px!important;font-weight:600!important;opacity:0.65!important}
        .mobile-sub button:hover{opacity:1!important;transform:none!important}
        .mobile-parent span{transition:transform 0.3s;display:inline-block;margin-left:4px}
        .mobile-parent.active span{transform:rotate(45deg)}
        .sub-nav-wrapper{overflow:hidden;max-height:0;transition:max-height 0.4s cubic-bezier(0.4,0,0.2,1);background:#fff;text-align:center;border-bottom:1px solid transparent}
        .sub-nav-wrapper.show{max-height:150px;margin-bottom:40px;border-bottom-color:#f0f0f0}
        .sub-nav{display:none;justify-content:center;flex-wrap:wrap;gap:24px;padding:24px 0;transform:translateY(-10px);opacity:0;transition:transform 0.3s ease,opacity 0.3s ease}
        .sub-nav.show{display:flex;transform:translateY(0);opacity:1}
        .hero{height:85vh;min-height:560px;width:100%;position:relative;background:#000;margin-bottom:80px;overflow:hidden;display:flex;align-items:end;justify-content:center}
        .hero-img{width:100%;height:100%;object-fit:cover;opacity:0.88;position:absolute;top:0;left:0;transform:scale(1.02);transition:transform 8s ease-out}
        .hero:hover .hero-img{transform:scale(1.06)}
        .hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.6) 0%,rgba(0,0,0,0.2) 40%,transparent 70%)}
        .hero-content{position:relative;z-index:2;text-align:center;color:#fff;padding-bottom:80px;width:100%}
        .hero-title{font-size:clamp(32px,6vw,72px);font-weight:900;letter-spacing:-2px;text-transform:uppercase;margin-bottom:16px;text-shadow:0 2px 20px rgba(0,0,0,0.3)}
        .hero-sub{font-size:14px;letter-spacing:4px;text-transform:uppercase;opacity:0.85;margin-bottom:32px;font-weight:600}
        .btn-primary{background:#000;color:#fff;border:1px solid #000;height:52px;padding:0 40px;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:2px;cursor:pointer;transition:var(--transition);display:inline-flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
        .btn-primary::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);transition:left 0.5s}
        .btn-primary:hover{background:#111;transform:translateY(-2px)}
        .btn-primary:hover::before{left:100%}
        .btn-primary:active{transform:translateY(0)}
        .btn-hero{background:#fff;color:#000;border-color:#fff}
        .btn-hero:hover{background:#fff;color:#000}
        .section-padding{padding:80px 0}
        .section-title{font-size:14px;font-weight:800;text-transform:uppercase;letter-spacing:3px;margin-bottom:40px;text-align:center;opacity:0.7}
        .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:28px}
        .product-card{cursor:pointer;position:relative;animation:fadeInUp 0.6s ease forwards;opacity:0;border-radius:0;box-shadow:none}
        .product-card:nth-child(1){animation-delay:0.05s}.product-card:nth-child(2){animation-delay:0.1s}.product-card:nth-child(3){animation-delay:0.15s}.product-card:nth-child(4){animation-delay:0.2s}.product-card:nth-child(5){animation-delay:0.25s}.product-card:nth-child(6){animation-delay:0.3s}
        @keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        .product-img-wrap{position:relative;background:var(--gray-bg);aspect-ratio:3/4;overflow:hidden;margin-bottom:16px;border:1px solid #EEEEEE}
        .product-img{width:100%;height:100%;object-fit:cover;transition:transform 0.7s cubic-bezier(0.165,0.84,0.44,1)}
        .product-card:hover .product-img{transform:scale(1.05)}
        .quick-add{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.9);background:#000;color:#fff;padding:12px 24px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;opacity:0;transition:var(--transition);pointer-events:none;white-space:nowrap}
        .product-card:hover .quick-add{opacity:1;transform:translate(-50%,-50%) scale(1)}
        .product-name{font-size:13px;font-weight:700;text-transform:uppercase;margin-bottom:4px;letter-spacing:0.5px}
        .product-price{font-size:14px;font-weight:500;color:#000}
        footer{background:#fff;border-top:1px solid #f0f0f0;padding:100px 0 40px;position:relative}
        .contact-section{text-align:center;margin-bottom:80px}
        .contact-title{font-size:28px;font-weight:900;text-transform:uppercase;letter-spacing:2px;margin-bottom:16px}
        .contact-sub{font-size:13px;color:var(--text-muted);margin-bottom:48px;letter-spacing:1px;text-transform:uppercase}
        .social-links{display:flex;justify-content:center;gap:60px;flex-wrap:wrap}
        .social-item{display:flex;flex-direction:column;align-items:center;gap:16px;text-decoration:none;color:#000;transition:var(--transition)}
        .social-circle{width:64px;height:64px;background:#000;display:flex;align-items:center;justify-content:center;transition:var(--transition)}
        .social-circle svg{width:26px;height:26px;fill:#fff;transition:var(--transition)}
        .social-item:hover .social-circle{transform:translateY(-4px) scale(1.05)}
        .social-item.wa:hover .social-circle{background:var(--whatsapp)}
        .social-item.ig:hover .social-circle{background:var(--instagram)}
        .social-item.wa:hover .social-label{color:var(--whatsapp)}
        .social-item.ig:hover .social-label{color:var(--instagram)}
        .social-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2px;transition:var(--transition)}
        .newsletter{max-width:420px;margin:0 auto 80px;text-align:center}
        .newsletter-input{width:100%;background:none;border:none;border-bottom:1px solid #000;padding:14px 0;font-size:12px;text-transform:uppercase;letter-spacing:1px;outline:none;transition:var(--transition);text-align:center;font-family:inherit}
        .newsletter-input:focus{border-bottom-color:var(--red)}
        .stamped-footer{text-align:center;font-size:11px;font-weight:800;letter-spacing:6px;text-transform:uppercase;margin-top:40px;color:#888}
        .copyright{text-align:center;font-size:10px;color:#aaa;margin-top:24px;text-transform:uppercase;letter-spacing:1px}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,0.98);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:4000;overflow-y:auto;align-items:center;justify-content:center;padding:20px}
        .modal.active{display:flex;animation:fadeIn 0.3s ease}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        .modal-content{max-width:1000px;width:100%;display:grid;grid-template-columns:1fr 1fr;gap:56px;background:#fff;padding:40px;animation:scaleIn 0.3s ease}
        @keyframes scaleIn{from{opacity:0;transform:scale(0.96)}to{opacity:1;transform:scale(1)}}
        .modal-content-auth{width:100%;max-width:400px;padding:40px;background:#fff}
        .size-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:24px 0}
        .size-btn{min-width:44px;height:44px;border:1px solid #ddd;background:#fff;font-size:12px;font-weight:600;cursor:pointer;transition:var(--transition)}
        .size-btn.active,.size-btn:hover{background:#000;color:#fff;border-color:#000;transform:translateY(-1px)}
        .search-overlay{position:absolute;top:calc(100% + 12px);right:0;width:300px;background:#fff;border:1px solid #f0f0f0;padding:12px;display:none;z-index:1100;animation:slideDown 0.2s ease}
        @keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
        .search-overlay.active{display:block}
        .sidebar{position:fixed;top:0;right:-100%;width:420px;max-width:92vw;height:100%;background:#fff;z-index:5000;transition:0.5s cubic-bezier(0.77,0,0.175,1);padding:32px;display:flex;flex-direction:column}
        .sidebar.active{right:0}
        .sidebar-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px;padding-bottom:16px;border-bottom:1px solid #f0f0f0}
        .cart-items{flex:1;overflow-y:auto;padding-right:8px;margin-right:-8px}
        .cart-items::-webkit-scrollbar{width:4px}
        .cart-items::-webkit-scrollbar-thumb{background:#ddd}
        .cart-item{display:flex;gap:16px;margin-bottom:24px;align-items:flex-start;position:relative;padding-right:28px}
        .cart-item-img{width:80px;aspect-ratio:3/4;background:#F5F5F5;object-fit:cover}
        .cart-item-info{flex:1;min-width:0}
        .cart-item-name{font-size:12px;font-weight:700;text-transform:uppercase;margin-bottom:4px;letter-spacing:0.3px;line-height:1.3}
        .cart-item-details{font-size:11px;color:#666;margin-bottom:8px}
        .cart-qty-control{display:flex;align-items:center;gap:10px}
        .qty-btn{background:#f5f5f5;border:1px solid #eee;width:26px;height:26px;cursor:pointer;font-size:14px;line-height:1;transition:var(--transition);display:flex;align-items:center;justify-content:center}
        .qty-btn:hover{background:#000;color:#fff;border-color:#000}
        .sidebar-footer{border-top:1px solid #f0f0f0;padding-top:24px;margin-top:16px}
        .cart-total{display:flex;justify-content:space-between;font-weight:800;margin-bottom:20px;text-transform:uppercase;letter-spacing:1px;font-size:14px}
        .overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.35);backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);z-index:3500;display:none;opacity:0;transition:opacity 0.3s}
        .overlay.active{display:block;opacity:1}
        .form-group{margin-bottom:20px}
        .form-label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;margin-bottom:8px;letter-spacing:1px}
        .form-input{width:100%;padding:12px 14px;border:1px solid #ddd;outline:none;font-family:inherit;font-size:14px;transition:var(--transition)}
        .form-input:focus{border-color:#000}
        .btn-black{width:100%;background:#000;color:#fff;border:none;padding:16px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;cursor:pointer;margin-top:10px;transition:var(--transition);font-size:13px}
        .btn-black:hover{background:#111;transform:translateY(-1px)}
        .btn-link{background:none;border:none;font-size:11px;text-transform:uppercase;letter-spacing:1px;cursor:pointer;margin-top:16px;text-decoration:underline;opacity:0.7;transition:var(--transition)}
        .btn-link:hover{opacity:1}
        .remove-btn{position:absolute;top:-4px;right:0;background:none;border:none;font-size:22px;cursor:pointer;opacity:0.3;line-height:1;width:24px;height:24px;display:flex;align-items:center;justify-content:center;transition:var(--transition)}
        .remove-btn:hover{opacity:1;background:#f5f5f5;color:var(--red)}
        .empty-cart{text-align:center;padding:60px 20px}
        .empty-cart-icon{font-size:48px;margin-bottom:16px;opacity:0.2}
        .btn-whatsapp-product{background:#000000;color:#FFFFFF;border:none;padding:16px 24px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:2px;cursor:pointer;width:100%;transition:all 0.3s ease}
        .btn-whatsapp-product:hover{background:#25D366;color:#FFFFFF}
        @media (max-width:1024px){.grid{grid-template-columns:repeat(2,1fr);gap:20px}.modal-content{grid-template-columns:1fr;gap:32px;max-height:90vh;overflow-y:auto}}
        @media (max-width:768px){
            .container{padding:0 16px}
            header{padding:14px 0}
            .logo{font-size:22px}.logo-slogan{display:none}
            .grid{grid-template-columns:repeat(2,1fr);gap:14px}
            .section-padding{padding:56px 0}
            .social-links{gap:32px}
            .hero{height:72vh;min-height:480px;margin-bottom:56px}
            .hero-content{padding-bottom:60px}
            .hamburger{display:flex}
            .nav-main{display:none !important}
            .auth-text{display:none}
            .modal-content{padding:24px}
            .search-overlay{width:260px;right:-40px}
            .sidebar{padding:24px;width:100%;max-width:100vw}
            .sub-nav-wrapper,.sub-nav-wrapper.show{display:none !important}
            .quick-add{display:none}
        }
        @media (max-width:480px){
            .grid{grid-template-columns:1fr;gap:18px}
            .hero-title{font-size:clamp(28px,9vw,42px);letter-spacing:-1px}
            .hero-sub{font-size:12px;letter-spacing:3px}
            .product-name{font-size:12px}
            .contact-title{font-size:22px}
            .social-circle{width:56px;height:56px}
        }
    </style>
</head>
<body>
    <div class="grain"></div>
    <header id="main-header">
        <div class="container header-content">
            <div class="logo-wrap" onclick="window.scrollTo({top:0,behavior:'smooth'})">
                <h1 class="logo">ZYSKN ★</h1>
                <span class="logo-slogan">STREETWEAR AR</span>
            </div>
            <nav class="nav-main">
                <button class="nav-link active" onclick="showMainCategory('all', this)">TODO</button>
                <button class="nav-link" onclick="showMainCategory('arriba', this)">ARRIBA</button>
                <button class="nav-link" onclick="showMainCategory('abajo', this)">ABAJO</button>
                <button class="nav-link" onclick="scrollToSection('contact')">CONTACTO</button>
            </nav>
            <div class="nav-actions">
                <button class="hamburger" onclick="toggleMobileMenu()" aria-label="Menú">
                    <span></span><span></span>
                </button>
                <button class="icon-btn search-btn" onclick="toggleSearch()" aria-label="Buscar">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                </button>
                <div id="auth-section"></div>
                <button class="icon-btn cart-btn" onclick="toggleCart()" aria-label="Carrito">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
                    <span class="cart-badge" id="cart-count">0</span>
                </button>
                <div class="search-overlay" id="search-overlay">
                    <input type="text" class="form-input" style="border:none;padding:8px 0;text-transform:uppercase;font-size:12px;letter-spacing:1px" id="search-input" placeholder="BUSCAR..." oninput="searchProducts()">
                </div>
            </div>
        </div>
    </header>

    <div class="mobile-menu" id="mobileMenu">
        <button class="mobile-close" onclick="toggleMobileMenu()">&times;</button>
        <button onclick="handleMobileNav('all')">TODO</button>
        
        <div class="mobile-nav-group">
            <button class="mobile-parent" onclick="toggleMobileSub('arriba', this)">ARRIBA <span>+</span></button>
            <div class="mobile-sub" id="mobile-sub-arriba">
                <button onclick="handleMobileFilter('remeras')">Remeras</button>
                <button onclick="handleMobileFilter('chombas')">Chombas</button>
                <button onclick="handleMobileFilter('casacas')">Casacas</button>
                <button onclick="handleMobileFilter('camisas')">Camisas</button>
                <button onclick="handleMobileFilter('hoodies')">Hoodies</button>
                <button onclick="handleMobileFilter('camperas')">Camperas</button>
            </div>
        </div>

        <div class="mobile-nav-group">
            <button class="mobile-parent" onclick="toggleMobileSub('abajo', this)">ABAJO <span>+</span></button>
            <div class="mobile-sub" id="mobile-sub-abajo">
                <button onclick="handleMobileFilter('pantalones')">Pantalones</button>
                <button onclick="handleMobileFilter('jeans')">Jeans</button>
                <button onclick="handleMobileFilter('bermudas')">Bermudas</button>
                <button onclick="handleMobileFilter('shorts')">Shorts</button>
            </div>
        </div>

        <button onclick="handleMobileNav('contact')">CONTACTO</button>
        <button onclick="openAuthModal('loginModal');toggleMobileMenu()" style="opacity:0.6;font-size:16px;margin-top:20px">LOGIN</button>
    </div>

    <div class="sub-nav-wrapper" id="sub-nav-wrapper">
        <div class="sub-nav" id="sub-arriba">
            <button class="nav-link" onclick="filterProducts('remeras', this)">Remeras</button>
