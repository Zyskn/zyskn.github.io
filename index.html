<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZYSKN ★ | Curated Vintage & Streetwear</title>
    <meta name="description" content="ZYSKN ★ - Curated Vintage & Streetwear. No Restocks. Encontrá piezas únicas seleccionadas a mano. Envíos a todo el país.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://zyskn.github.io/">
    <meta property="og:title" content="ZYSKN ★ | Curated Vintage & Streetwear">
    <meta property="og:description" content="Piezas únicas de colección. Streetwear & Vintage seleccionado.">
    <meta property="og:image" content="https://i.imgur.com/AoRv9TN.png">
    <link rel="icon" type="image/png" href="https://i.imgur.com/AoRv9TN.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        :root { --accent:#000; --gray-bg:#F5F5F5; --text-muted:#666; --blue:#3B82F6; --blue-hover:#2563EB; --red:#EF4444; --red-hover:#DC2626; --whatsapp:#25D366; --instagram:#E4405F; --transition:all 0.3s cubic-bezier(0.4,0,0.2,1); --container-max:1400px; }
        *{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
        body{background:#fff;color:#000;font-family:'Inter','Helvetica Neue',Helvetica,Arial,sans-serif;line-height:1.5;overflow-x:hidden;scroll-behavior:smooth}
        .grain{position:fixed;top:0;left:0;width:100%;height:100%;background:url('https://grainy-gradients.vercel.app/noise.svg');opacity:0.03;pointer-events:none;z-index:9999}
        .container{max-width:var(--container-max);margin:0 auto;padding:0 24px}
        header{position:sticky;top:0;background:rgba(255,255,255,0.85);backdrop-filter:blur(12px);z-index:1000;border-bottom:1px solid #f0f0f0;padding:24px 0;transition:var(--transition)}
        .header-content{display:flex;justify-content:space-between;align-items:center}
        .logo-wrap{display:flex;flex-direction:column;cursor:pointer}
        .logo{font-size:28px;font-weight:900;letter-spacing:-1px;text-transform:uppercase;line-height:1}
        .logo-slogan{font-size:14px;font-weight:600;color:var(--text-muted);margin-top:4px;letter-spacing:0.5px}
        .nav-main{display:flex;gap:32px;align-items:center}
        .nav-link{background:none;border:none;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:2px;cursor:pointer;opacity:0.42;transition:var(--transition)}
        .nav-link:hover,.nav-link.active{opacity:1}
        .nav-actions{display:flex;align-items:center;gap:24px}
        .icon-btn{background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--transition);position:relative}
        .icon-btn svg{width:20px;height:20px;stroke-width:2}
        .search-btn{color:var(--blue)} .search-btn:hover{color:var(--blue-hover);transform:scale(1.05)}
        .auth-text{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#000;transition:var(--transition);cursor:pointer}
        .auth-text:hover{color:var(--text-muted)}
        .cart-btn{color:var(--red)} .cart-btn:hover{color:var(--red-hover);transform:scale(1.05)}
        .cart-badge{position:absolute;top:-6px;right:-8px;background:#000;color:#fff;font-size:9px;font-weight:700;min-width:16px;height:16px;display:flex;align-items:center;justify-content:center;border-radius:8px}
        .sub-nav-wrapper{overflow:hidden;max-height:0;transition:max-height 0.4s cubic-bezier(0.4,0,0.2,1);background:#fff;text-align:center}
        .sub-nav-wrapper.show{max-height:150px;margin-bottom:40px}
        .sub-nav{display:none;justify-content:center;flex-wrap:wrap;gap:24px;padding:30px 0;transform:translateY(-10px);opacity:0;transition:transform 0.3s ease,opacity 0.3s ease}
        .sub-nav.show{display:flex;transform:translateY(0);opacity:1}
        .hero{height:85vh;width:100%;position:relative;background:#000;margin-bottom:80px;overflow:hidden}
        .hero-img{width:100%;height:100%;object-fit:cover;opacity:0.9}
        .hero-btn-wrap{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);width:100%;display:flex;justify-content:center}
        .btn-primary{background:#000;color:#fff;border:none;height:52px;padding:0 40px;font-size:14px;font-weight:600;text-transform:uppercase;letter-spacing:2px;cursor:pointer;transition:var(--transition);display:flex;align-items:center;justify-content:center}
        .btn-primary:hover{background:var(--red-hover);transform:scale(0.98)}
        .section-padding{padding:80px 0}
        .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
        .product-card{cursor:pointer;position:relative;animation:fadeInUp 0.5s ease forwards}
        @keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        .product-img-wrap{position:relative;background:var(--gray-bg);aspect-ratio:3/4;overflow:hidden;margin-bottom:16px}
        .product-img{width:100%;height:100%;object-fit:cover;transition:transform 0.6s cubic-bezier(0.165,0.84,0.44,1)}
        .product-card:hover .product-img{transform:scale(1.03)}
        .quick-add{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#000;color:#fff;padding:12px 24px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;opacity:0;transition:var(--transition);pointer-events:none}
        .product-card:hover .quick-add{opacity:1}
        .product-name{font-size:13px;font-weight:600;text-transform:uppercase;margin-bottom:4px;letter-spacing:0.5px}
        .product-price{font-size:14px;font-weight:400;color:#000}
        footer{background:#fff;border-top:1px solid #f0f0f0;padding:100px 0 40px;position:relative}
        .footer-paper-texture{position:absolute;top:0;left:0;width:100%;height:100%;background:url('https://www.transparenttextures.com/patterns/paper.png');opacity:0.02;pointer-events:none}
        .contact-section{text-align:center;margin-bottom:80px}
        .contact-title{font-size:32px;font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-bottom:48px}
        .social-links{display:flex;justify-content:center;gap:60px}
        .social-item{display:flex;flex-direction:column;align-items:center;gap:16px;text-decoration:none;color:#000}
        .social-circle{width:60px;height:60px;background:#000;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:var(--transition)}
        .social-circle svg{width:24px;height:24px;fill:#fff}
        .social-item:hover .social-circle{transform:scale(1.1)}
        .social-item.wa:hover .social-circle{background:var(--whatsapp)}
        .social-item.ig:hover .social-circle{background:var(--instagram)}
        .social-label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:2px}
        .newsletter{max-width:400px;margin:0 auto 80px;text-align:center}
        .newsletter-input{width:100%;background:none;border:none;border-bottom:1px solid #000;padding:12px 0;font-size:12px;text-transform:uppercase;letter-spacing:1px;outline:none}
        .stamped-footer{text-align:center;opacity:0.6;font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;margin-top:40px}
        .copyright{text-align:center;font-size:10px;color:var(--text-muted);margin-top:24px;text-transform:uppercase;letter-spacing:1px}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,0.98);z-index:4000;overflow-y:auto;align-items:center;justify-content:center}
        .modal.active{display:flex}
        .modal-content{max-width:1000px;width:90%;display:grid;grid-template-columns:1fr 1fr;gap:48px;padding:40px}
        .modal-content-auth{width:100%;max-width:400px;padding:40px;background:#fff}
        .size-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:24px 0}
        .size-btn{width:44px;height:44px;border:1px solid #000;background:#fff;font-size:12px;font-weight:600;cursor:pointer;transition:var(--transition)}
        .size-btn.active,.size-btn:hover{background:#000;color:#fff}
        .search-overlay{position:absolute;top:100%;right:0;width:320px;background:#fff;border:1px solid #f0f0f0;padding:16px;display:none;box-shadow:0 10px 30px rgba(0,0,0,0.05);z-index:1100}
        .search-overlay.active{display:block}
        .sidebar{position:fixed;top:0;right:-100%;width:400px;max-width:90vw;height:100%;background:#fff;z-index:5000;transition:0.5s cubic-bezier(0.77,0,0.175,1);padding:40px;box-shadow:-10px 0 30px rgba(0,0,0,0.05);display:flex;flex-direction:column}
        .sidebar.active{right:0}
        .sidebar-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:40px}
        .cart-items{flex:1;overflow-y:auto}
        .cart-item{display:flex;gap:20px;margin-bottom:24px;align-items:flex-start}
        .cart-item-img{width:80px;aspect-ratio:3/4;background:#F5F5F5;object-fit:cover}
        .cart-item-info{flex:1}
        .cart-item-name{font-size:12px;font-weight:700;text-transform:uppercase;margin-bottom:4px}
        .cart-item-details{font-size:11px;color:#666;margin-bottom:6px}
        .cart-qty-control{display:flex;align-items:center;gap:12px;margin-top:8px}
        .qty-btn{background:none;border:1px solid #ddd;width:24px;height:24px;cursor:pointer;font-size:14px;line-height:1}
        .sidebar-footer{border-top:1px solid #f0f0f0;padding-top:24px}
        .cart-total{display:flex;justify-content:space-between;font-weight:700;margin-bottom:24px;text-transform:uppercase;letter-spacing:1px}
        .overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.2);z-index:3500;display:none}
        .overlay.active{display:block}
        .form-group{margin-bottom:20px}
        .form-label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;margin-bottom:8px;letter-spacing:1px}
        .form-input{width:100%;padding:12px;border:1px solid #000;outline:none;font-family:inherit;font-size:14px}
        .btn-black{width:100%;background:#000;color:#fff;border:none;padding:16px;font-weight:700;text-transform:uppercase;letter-spacing:1px;cursor:pointer;margin-top:10px;transition:var(--transition)}
        .btn-black:hover{background:var(--red)}
        .btn-link{background:none;border:none;font-size:11px;text-transform:uppercase;letter-spacing:1px;cursor:pointer;margin-top:16px;text-decoration:underline}
        @media (max-width:768px){header{padding:16px 0}.logo{font-size:22px}.grid{grid-template-columns:repeat(2,1fr);gap:16px}.section-padding{padding:48px 0}.social-links{gap:32px}.modal-content{grid-template-columns:1fr;padding:20px}.hero{height:70vh}}
    </style>
</head>

    {id:'t4', section:'arriba', category:'hoodies', name:'WASHED HOODIE', price:45000, desc:'Heavyweight 400gsm.', img:'https://images.unsplash.com/photo-1578768079052-aa76e52ff102?auto=format&fit=crop&w=900&q=80', sizes:['M','L','XL']},
    {id:'p1', section:'abajo', category:'pantalones', name:'CARGO PANTS', price:56000, desc:'Heavy duty cotton. Multi-pocket.', img:'https://images.unsplash.com/photo-1473966968600-fa801b869a1a?auto=format&fit=crop&w=900&q=80', sizes:['38','40','42','44']},
    {id:'p2', section:'abajo', category:'jeans', name:'BAGGY DENIM', price:54000, desc:'Y2K aesthetic. Loose fit.', img:'https://images.unsplash.com/photo-1542272604-787c3835535d?auto=format&fit=crop&w=900&q=80', sizes:['38','40','42']}
];

let cart = JSON.parse(localStorage.getItem('zyskn_cart')) || [];
let currentUser = JSON.parse(localStorage.getItem('zyskn_user')) || null;
let selectedSize = null;
let currentProduct = null;
let currentSection = null;

document.addEventListener('DOMContentLoaded', () => {
    renderProducts(products);
    updateCartUI();
    checkAuth();
});

function renderProducts(list){
    const grid = document.getElementById('product-grid');
    grid.innerHTML = list.map(p => `
        <div class="product-card" onclick="openModal('${p.id}')">
            <div class="product-img-wrap">
                <img src="${p.img}" alt="${p.name}" class="product-img" loading="lazy">
                <div class="quick-add">QUICK ADD</div>
            </div>
            <h3 class="product-name">${p.name}</h3>
            <p class="product-price">$${p.price.toLocaleString('es-AR')}</p>
        </div>
    `).join('');
}

function showMainCategory(section, btn){
    const wrapper = document.getElementById('sub-nav-wrapper');
    document.querySelectorAll('.nav-main .nav-link').forEach(l=>l.classList.remove('active'));
    if(btn) btn.classList.add('active');

    if(currentSection === section && section !== 'all'){
        wrapper.classList.remove('show');
        document.querySelectorAll('.sub-nav').forEach(s=>s.classList.remove('show'));
        currentSection = null;
        renderProducts(products);
        return;
    }
    if(section === 'all'){
        wrapper.classList.remove('show');
        renderProducts(products);
        currentSection = 'all';
        return;
    }
    wrapper.classList.remove('show');
    document.querySelectorAll('.sub-nav').forEach(s=>s.classList.remove('show'));
    setTimeout(()=>{
        wrapper.classList.add('show');
        document.getElementById(`sub-${section}`).classList.add('show');
        renderProducts(products.filter(p=>p.section===section));
        currentSection = section;
        window.scrollTo({top:0,behavior:'smooth'});
    },50);
}

function filterProducts(cat){
    renderProducts(products.filter(p=>p.category===cat));
    scrollToSection('shop');
}

function toggleSearch(){ document.getElementById('search-overlay').classList.toggle('active'); }
function searchProducts(){
    const q = document.getElementById('search-input').value.toLowerCase();
    renderProducts(products.filter(p=>p.name.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q)));
}

function openModal(id){
    currentProduct = products.find(x=>x.id===id);
    document.getElementById('modalImg').src = currentProduct.img;
    document.getElementById('modalName').textContent = currentProduct.name;
    document.getElementById('modalPrice').textContent = `$${currentProduct.price.toLocaleString('es-AR')}`;
    document.getElementById('modalDesc').textContent = currentProduct.desc;
    document.getElementById('modalSizes').innerHTML = currentProduct.sizes.map(s=>`<button class="size-btn" onclick="selectSize('${s}',this)">${s}</button>`).join('');
    selectedSize = null;
    document.getElementById('productModal').classList.add('active');
    document.body.style.overflow='hidden';
}
function selectSize(s, btn){ document.querySelectorAll('.size-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); selectedSize = s; }
function closeModal(){ document.getElementById('productModal').classList.remove('active'); document.body.style.overflow='auto'; }

function addToCartFromModal(){
    if(!selectedSize){ alert('Elegí un talle'); return; }
    addToCart(currentProduct.id, selectedSize);
    closeModal();
}
function addToCart(id, talle){
    const p = products.find(x=>x.id===id);
    const existing = cart.find(i=>i.id===id && i.talle===talle);
    if(existing){ existing.qty++; } else { cart.push({...p, talle, qty:1}); }
    saveCart();
    toggleCart(true);
}
function updateQty(index, delta){
    cart[index].qty += delta;
    if(cart[index].qty <=0) cart.splice(index,1);
    saveCart();
}
function saveCart(){ localStorage.setItem('zyskn_cart', JSON.stringify(cart)); updateCartUI(); }
function updateCartUI(){
    const container = document.getElementById('cart-items-container');
    const count = document.getElementById('cart-count');
    const totalEl = document.getElementById('cart-total-price');
    const totalQty = cart.reduce((a,i)=>a+i.qty,0);
    count.textContent = totalQty;
    let total = 0;
    if(cart.length===0){
        container.innerHTML = `<p style="font-size:12px;text-transform:uppercase;opacity:0.6;text-align:center;margin-top:40px">Tu carrito está vacío</p>`;
    } else {
        container.innerHTML = cart.map((item,i)=>{
            total += item.price * item.qty;
            return `<div class="cart-item">
                <img src="${item.img}" class="cart-item-img" alt="">
                <div class="cart-item-info">
                    <p class="cart-item-name">${item.name}</p>
                    <p class="cart-item-details">TALLE: ${item.talle} | $${item.price.toLocaleString('es-AR')}</p>
                    <div class="cart-qty-control">
                        <button class="qty-btn" onclick="updateQty(${i},-1)">-</button>
                        <span style="font-size:12px;width:20px;text-align:center">${item.qty}</span>
                        <button class="qty-btn" onclick="updateQty(${i},1)">+</button>
                    </div>
                </div>
            </div>`;
        }).join('');
    }
    totalEl.textContent = `$${total.toLocaleString('es-AR')}`;
}
function toggleCart(forceOpen=false){
    const s = document.getElementById('cartSidebar');
    const o = document.getElementById('overlay');
    if(forceOpen){ s.classList.add('active'); o.classList.add('active'); }
    else { s.classList.toggle('active'); o.classList.toggle('active'); }
}
function checkoutWhatsApp(){
    if(cart.length===0){ alert('Tu carrito está vacío'); return; }
    let msg = `ZYSKN ★ - NUEVO PEDIDO

`;
    let total = 0;
    cart.forEach((item,i)=>{
        const sub = item.price * item.qty;
        total += sub;
        msg += `${i+1}. ${item.name}
   Talle: ${item.talle} | Cantidad: ${item.qty}
   Precio unit: $${item.price.toLocaleString('es-AR')} | Subtotal: $${sub.toLocaleString('es-AR')}

`;
    });
    msg += `TOTAL: $${total.toLocaleString('es-AR')}

`;
    msg += `Cliente: ${currentUser ? currentUser.email : 'Invitado'}
`;
    msg += `Fecha: ${new Date().toLocaleString('es-AR')}

`;
    msg += `Envío a coordinar.`;
    const url = `https://wa.me/5493544631553?text=${encodeURIComponent(msg)}`;
    window.open(url,'_blank');
}

// AUTH
function checkAuth(){
    const auth = document.getElementById('auth-section');
    if(currentUser){
        const name = currentUser.email.split('@')[0];
        auth.innerHTML = `<span class="auth-text" style="color:#000">HOLA, ${name.toUpperCase()}</span> <span onclick="logout()" style="font-size:9px;cursor:pointer;margin-left:8px;opacity:0.6">(SALIR)</span>`;
    } else {
        auth.innerHTML = `<span class="auth-text" onclick="openAuthModal('loginModal')">LOGIN / REGISTER</span>`;
    }
}
function openAuthModal(id){ closeAll(); document.getElementById(id).classList.add('active'); document.getElementById('overlay').classList.add('active'); }
function handleRegister(){
    const email = document.getElementById('regEmail').value.trim().toLowerCase();
    const pass = document.getElementById('regPass').value;
    if(!email || !pass || pass.length<6){ alert('Completá email y contraseña (mínimo 6 caracteres)'); return; }
    let users = JSON.parse(localStorage.getItem('zyskn_users_db')) || [];
    if(users.find(u=>u.email===email)){ alert('Ese email ya está registrado'); return; }
    users.push({email, pass});
    localStorage.setItem('zyskn_users_db', JSON.stringify(users));
    alert('Cuenta creada. Ahora iniciá sesión.');
    openAuthModal('loginModal');
}
function handleLogin(){
    const email = document.getElementById('loginEmail').value.trim().toLowerCase();
    const pass = document.getElementById('loginPass').value;
    let users = JSON.parse(localStorage.getItem('zyskn_users_db')) || [];
    const user = users.find(u=>u.email===email && u.pass===pass);
    if(user){
        currentUser = {email:user.email};
        localStorage.setItem('zyskn_user', JSON.stringify(currentUser));
        closeAll();
        checkAuth();
    } else { alert('Email o contraseña incorrectos'); }
}
function logout(){ currentUser=null; localStorage.removeItem('zyskn_user'); checkAuth(); }

function closeAll(){ document.querySelectorAll('.modal').forEach(m=>m.classList.remove('active')); document.getElementById('cartSidebar').classList.remove('active'); document.getElementById('overlay').classList.remove('active'); document.body.style.overflow='auto'; }
function scrollToSection(id){ document.getElementById(id)?.scrollIntoView({behavior:'smooth'}); }
</script>
</body>
</html>
