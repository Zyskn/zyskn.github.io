  <!-- ============================================================
       SCHEMA: Organization
  ============================================================ -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "ZYSKN",
    "url": "https://zyskn.github.io",
    "logo": "https://zyskn.github.io/favicon.png",
    "sameAs": [
      "https://instagram.com/zyskn_",
      "https://www.tiktok.com/@zyskn_"
    ]
  }
  </script>

  <!-- ============================================================
       SCHEMA: ClothingStore (Local SEO)
  ============================================================ -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "ClothingStore",
    "name": "ZYSKN",
    "url": "https://zyskn.github.io",
    "telephone": "+5493544631553",
    "description": "Tienda de ropa vintage curada y streetwear en Córdoba, Argentina. Remeras americanas, hoodies oversize, cargos y camperas importadas. Piezas únicas seleccionadas una por una, sin restock.",
    "address": {
      "@type": "PostalAddress",
      "addressLocality": "Córdoba",
      "addressRegion": "Córdoba",
      "addressCountry": "AR"
    },
    "sameAs": [
      "https://instagram.com/zyskn_",
      "https://www.tiktok.com/@zyskn_"
    ],
    "priceRange": "$$",
    "currenciesAccepted": "ARS",
    "paymentAccepted": "Transferencia bancaria, Efectivo",
    "keywords": "ropa vintage Córdoba, remeras americanas Córdoba, streetwear Córdoba Argentina, hoodies oversize, ropa importada Córdoba"
  }
  </script>

  <!-- ============================================================
       SCHEMA: WebSite con SearchAction
  ============================================================ -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "ZYSKN",
    "url": "https://zyskn.github.io",
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://zyskn.github.io/?q={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>

  <!-- ============================================================
       SCHEMA: ItemList (catálogo de productos — se actualiza via JS)
       Se inyecta dinámicamente cuando cargan los productos
  ============================================================ -->
  <script id="schema-itemlist" type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "ItemList",
    "name": "Ropa Vintage y Streetwear ZYSKN Córdoba",
    "description": "Catálogo de prendas vintage curadas: remeras americanas, hoodies oversize, cargos, camperas y más. Únicas unidades sin restock.",
    "url": "https://zyskn.github.io",
    "itemListElement": []
  }
  </script>
