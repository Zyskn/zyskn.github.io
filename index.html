<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZYSKN ★ | Curated Vintage & Streetwear</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="ZYSKN ★ - Curated Vintage & Streetwear. No Restocks. Encontrá piezas únicas seleccionadas a mano. Envíos a todo el país.">
    <meta name="keywords" content="ZYSKN, ZYSKN vintage, streetwear argentina, ropa vintage, curated vintage, 1 of 1, moda urbana">
    <meta name="author" content="ZYSKN">
    <meta name="robots" content="index, follow">
    
    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://zyskn.github.io/">
    <meta property="og:title" content="ZYSKN ★ | Curated Vintage & Streetwear">
    <meta property="og:description" content="Piezas únicas de colección. Streetwear & Vintage seleccionado.">
    <meta property="og:image" content="https://i.imgur.com/AoRv9TN.png">

    <link rel="icon" type="image/png" href="https://i.imgur.com/AoRv9TN.png">
    
    <style>
        :root {
            --accent: #000;
            --gray: #f5f5f5;
            --text-muted: #666;
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        *{margin:0;padding:0;box-sizing:border-box}
        
        body{
            background:#fff;
            color:#000;
            font-family:'Helvetica Neue', Helvetica, Arial, sans-serif;
            line-height: 1.5;
            overflow-x: hidden;
        }

        /* Fondo con Logo Sutil */
        body::before{
            content:'';
            position:fixed;
            top:50%;
            left:50%;
            transform:translate(-50%,-50%);
            width:70vw;
            height:70vw;
            max-width: 600px;
            max-height: 600px;
            background:url('https://i.imgur.com/AoRv9TN.png') center/contain no-repeat;
            opacity:.03;
            z-index:-1;
            pointer-events:none;
        }

        .container{
            max-width:1400px;
            margin:0 auto;
            padding:0 20px;
        }

        /* Header Horizontal */
        header{
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            position: sticky;
            top: 0;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            z-index: 100;
            margin-bottom: 40px;
            border-bottom: 1px solid #f0f0f0;
        }

        .logo{
            font-size: 22px;
            font-weight:900;
            letter-spacing:-1px;
            text-transform: uppercase;
            cursor: pointer;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .main-filters{
            display: flex;
            gap: 15px;
        }

        .filter-btn{
            background:transparent;
            color:#000;
            border:none;
            padding:5px 0;
            font-size:11px;
            text-transform:uppercase;
            letter-spacing:1px;
            cursor:pointer;
            transition: var(--transition);
            font-weight: 700;
            opacity: 0.4;
        }

        .filter-btn:hover, .filter-btn.active{
            opacity: 1;
        }

        /* Iconos Lupa y Carrito */
        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
            position: relative;
            display: flex;
            align-items: center;
        }
        .icon-btn svg { width: 18px; height: 18px; stroke: #000; fill: none; stroke-width: 2; }
        
        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #000;
            color: #fff;
            font-size: 8px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
        }

        /* Buscador */
        .search-container {
            position: absolute;
            right: 0;
            top: 100%;
            width: 300px;
            background: #fff;
            padding: 15px;
            border: 1px solid #eee;
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .search-container.active { display: block; }
        .search-input {
            width: 100%;
            padding: 10px;
            border: 1px solid #eee;
            font-size: 12px;
            outline: none;
            text-transform: uppercase;
        }

        /* Subfiltros */
        .sub-wrapper{
            overflow:hidden;
            max-height:0;
            transition: max-height 0.5s ease;
            text-align: center;
        }
        .sub-wrapper.show{ max-height: 100px; margin-bottom: 40px; }

        .sub-filters{
            display: none;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .sub-filters.show{ display: flex; }

        /* Grilla de Productos */
        .products-wrapper{
            opacity: 0;
            transform: translateY(20px);
            transition: var(--transition);
        }
        .products-wrapper.show{
            opacity: 1;
            transform: translateY(0);
        }

        .products{
            display:grid;
            grid-template-columns:repeat(auto-fill,minmax(280px, 1fr));
            gap:40px 25px;
        }

        .product{
            display:none;
            cursor:pointer;
            position:relative;
            animation: fadeIn 0.6s ease forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .product.show{display:block}

        .product-img-wrap{
            position:relative;
            overflow:hidden;
            background: var(--gray);
            margin-bottom:15px;
        }

        .product-img{
            width:100%;
            aspect-ratio:3/4;
            object-fit:cover;
            transition: transform 0.8s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .product:hover .product-img{ transform:scale(1.05); }

        .sold-out-badge{
            position:absolute;
            top:15px;
            right:15px;
            background:#000;
            color:#fff;
            padding:8px 15px;
            font-size:9px;
            font-weight:800;
            letter-spacing:1px;
            text-transform:uppercase;
            z-index: 2;
        }

        .product-name{
            font-size:13px;
            font-weight:800;
            margin-bottom:5px;
            text-transform:uppercase;
            letter-spacing: 0.5px;
        }

        .product-price{
            font-size:13px;
            font-weight: 400;
            color: var(--text-muted);
        }

        /* Modal */
        .modal{
            display:none;
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgba(255,255,255,0.98);
            z-index:1000;
            overflow-y:auto;
        }
        .modal.active{ display: flex; align-items: center; justify-content: center; }

        .modal-content{
            max-width:1000px;
            width:95%;
            display:grid;
            grid-template-columns: 1.2fr 1fr;
            gap:50px;
            position:relative;
            padding: 40px;
        }

        .modal-close{
            position:fixed;
            top:30px;
            right:30px;
            font-size:30px;
            cursor:pointer;
            font-weight: 200;
        }

        .modal-img{ width:100%; aspect-ratio:3/4; object-fit:cover; background: var(--gray); }

        .modal-info{ text-align:left; display: flex; flex-direction: column; justify-content: center; }

        .modal-name{ font-size:28px; font-weight:900; margin-bottom:10px; text-transform:uppercase; letter-spacing: -1px; }

        .modal-price{ font-size:20px; margin-bottom:30px; font-weight: 300; }

        .modal-desc{ font-size:14px; color: var(--text-muted); margin-bottom:30px; line-height:1.8; }

        .size-title{ font-size:10px; font-weight: 800; margin-bottom:15px; text-transform:uppercase; letter-spacing:2px; }

        .sizes{ display:flex; gap:10px; margin-bottom:40px; }

        .size-btn{
            border:1px solid #eee;
            background:transparent;
            padding:12px 20px;
            font-size:11px;
            font-weight: 700;
            cursor:pointer;
            transition: var(--transition);
        }
        .size-btn.active, .size-btn:hover{ background:#000; color:#fff; border-color:#000; }

        .btn{
            display:block;
            background:#000;
            color:#fff;
            text-decoration:none;
            padding:20px;
            font-size:12px;
            font-weight:800;
            text-transform:uppercase;
            letter-spacing:2px;
            text-align:center;
            transition: var(--transition);
            border: none;
            cursor: pointer;
            width: 100%;
        }
        .btn:hover{ opacity:.8; }
        .btn.disabled{ background:#eee; color:#999; cursor:not-allowed; }

        /* Sidebar Carrito */
        .cart-sidebar {
            position: fixed;
            top: 0;
            right: -400px;
            width: 400px;
            height: 100%;
            background: #fff;
            z-index: 1100;
            box-shadow: -10px 0 30px rgba(0,0,0,0.05);
            transition: right 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            display: flex;
            flex-direction: column;
            padding: 40px;
        }
        .cart-sidebar.active { right: 0; }
        
        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }
        .cart-title { font-size: 18px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }
        .cart-close { cursor: pointer; font-size: 24px; }

        .cart-items { flex-grow: 1; overflow-y: auto; }
        .cart-item {
            display: grid;
            grid-template-columns: 80px 1fr auto;
            gap: 15px;
            margin-bottom: 20px;
            align-items: center;
        }
        .cart-item-img { width: 80px; aspect-ratio: 3/4; object-fit: cover; background: var(--gray); }
        .cart-item-info h4 { font-size: 11px; font-weight: 800; text-transform: uppercase; }
        .cart-item-info p { font-size: 11px; opacity: 0.5; }
        .cart-item-remove { cursor: pointer; font-size: 10px; text-decoration: underline; text-transform: uppercase; }

        .cart-footer { border-top: 1px solid #eee; padding-top: 30px; }
        .cart-total {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: 800;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        /* Seccion Contacto */
        .contact-wrapper{ display: none; padding: 80px 0; text-align: center; }
        .contact-wrapper.show{ display: block; animation: fadeIn 0.6s ease; }

        .contact-links{ display:flex; justify-content:center; gap:40px; }
        .contact-link{ display:flex; flex-direction:column; align-items:center; gap:15px; color:#000; text-decoration:none; font-size:11px; font-weight: 700; text-transform: uppercase; }
        .contact-icon{ width:56px; height:56px; border-radius:50%; display:flex; align-items:center; justify-content:center; transition: var(--transition); background: #000; }
        .contact-icon svg{ width:24px; height:24px; fill:#fff; }
        .contact-link.whatsapp:hover .contact-icon{ background:#25D366; }
        .contact-link.instagram:hover .contact-icon{ background:radial-gradient(circle at 30% 107%,#fdf497 0%,#fdf497 5%,#fd5949 45%,#d6249f 60%,#285AEB 90%); }

        .footer-info{ margin-top: 100px; padding: 60px 20px; border-top: 1px solid #eee; text-align: center; }
        .info-tagline{ font-size: 10px; letter-spacing: 5px; text-transform: uppercase; font-weight: 800; margin-bottom: 20px; }
        .footer{ font-size:10px; opacity:.3; margin-top:40px; letter-spacing:2px; text-transform: uppercase; }

        @media(max-width:768px){
            header { padding: 15px 0; }
            .main-filters { display: none; }
            .cart-sidebar { width: 100%; right: -100%; }
            .modal-content{ grid-template-columns:1fr; gap:30px; padding: 20px; }
            .products{ grid-template-columns:repeat(2,1fr); gap:25px 15px; }
        }
    </style>
</head>

    <script>
        let cart = [];
        let currentProduct = null;
        let selectedSize = null;

        window.onload = () => {
            document.getElementById('products-wrapper').classList.add('show');
            updateCartUI();
        };

        function toggleSearch() {
            document.getElementById('search-container').classList.toggle('active');
            document.getElementById('search-input').focus();
        }

        function searchProducts() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const products = document.querySelectorAll('.product');
            products.forEach(p => {
                const name = p.getAttribute('data-name').toLowerCase();
                p.style.display = name.includes(query) ? 'block' : 'none';
            });
        }

        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('active');
        }

        function showMainCategory(section){
            const products=document.querySelectorAll('.product');
            const buttons=document.querySelectorAll('.filter-btn.main');
            const subWrapper=document.getElementById('sub-wrapper');
            const contactWrapper=document.getElementById('contact-wrapper');
            const productsWrapper=document.getElementById('products-wrapper');
            
            buttons.forEach(btn=>btn.classList.remove('active'));
            if(event) event.target.classList.add('active');
            
            document.querySelectorAll('.sub-filters').forEach(s => s.classList.remove('show'));
            contactWrapper.classList.remove('show');
            productsWrapper.classList.add('show');
            
            if(section==='all'){
                subWrapper.classList.remove('show');
                products.forEach(p=>p.classList.add('show'));
            } else {
                subWrapper.classList.add('show');
                document.getElementById(`sub-${section}`).classList.add('show');
                products.forEach(p=>p.getAttribute('data-section')===section ? p.classList.add('show') : p.classList.remove('show'));
            }
        }

        function filterProducts(category){
            const products=document.querySelectorAll('.product');
            const subButtons=document.querySelectorAll('.sub-filters .filter-btn');
            subButtons.forEach(btn=>btn.classList.remove('active'));
            event.target.classList.add('active');
            products.forEach(p=>p.getAttribute('data-category')===category ? p.classList.add('show') : p.classList.remove('show'));
        }

        function showContact(){
            document.getElementById('products-wrapper').classList.remove('show');
            document.getElementById('sub-wrapper').classList.remove('show');
            document.getElementById('contact-wrapper').classList.add('show');
            document.querySelectorAll('.filter-btn.main').forEach(btn=>btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        function openModal(el){
            const modal=document.getElementById('productModal');
            currentProduct = {
                name: el.getAttribute('data-name'),
                price: Number(el.getAttribute('data-price')),
                img: el.getAttribute('data-img')
            };
            selectedSize = null;
            
            document.getElementById('modalName').textContent=currentProduct.name;
            document.getElementById('modalPrice').textContent='$'+currentProduct.price.toLocaleString('es-AR');
            document.getElementById('modalDesc').textContent=el.getAttribute('data-desc');
            document.getElementById('modalImg').src=currentProduct.img;
            
            const sizes=el.getAttribute('data-sizes').split(',');
            const sizesContainer=document.getElementById('modalSizes');
            sizesContainer.innerHTML='';
            sizes.forEach(size=>{
                const btn=document.createElement('button');
                btn.className='size-btn';
                btn.textContent=size;
                btn.onclick=()=> {
                    document.querySelectorAll('.size-btn').forEach(b=>b.classList.remove('active'));
                    btn.classList.add('active');
                    selectedSize = size;
                };
                sizesContainer.appendChild(btn);
            });

            document.getElementById('addToCartBtn').onclick = addToCart;
            modal.classList.add('active');
            document.body.style.overflow='hidden';
        }

        function addToCart() {
            if(!selectedSize) {
                alert('Please select a size');
                return;
            }
            cart.push({ ...currentProduct, size: selectedSize });
            updateCartUI();
            closeModal();
            toggleCart();
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        function updateCartUI() {
            const container = document.getElementById('cart-items');
            const countLabel = document.getElementById('cart-count');
            const totalLabel = document.getElementById('cart-total-price');
            
            container.innerHTML = '';
            let total = 0;
            
            cart.forEach((item, index) => {
                total += item.price;
                container.innerHTML += `
                    <div class="cart-item">
                        <img src="${item.img}" class="cart-item-img">
                        <div class="cart-item-info">
                            <h4>${item.name}</h4>
                            <p>SIZE: ${item.size}</p>
                            <span class="cart-item-remove" onclick="removeFromCart(${index})">Remove</span>
                        </div>
                        <div style="font-size: 11px; font-weight: 800;">$${item.price.toLocaleString('es-AR')}</div>
                    </div>
                `;
            });
            
            countLabel.textContent = cart.length;
            totalLabel.textContent = '$' + total.toLocaleString('es-AR');
        }

        function checkoutWhatsApp() {
            if(cart.length === 0) return;
            
            let message = "Hola ZYSKN ★ Quiero realizar un pedido:\n\n";
            let total = 0;
            
            cart.forEach((item, index) => {
                message += `${index + 1}. ${item.name} - Talle: ${item.size} ($${item.price.toLocaleString('es-AR')})\n`;
                total += item.price;
            });
            
            message += `\n*TOTAL: $${total.toLocaleString('es-AR')}*`;
            const encodedMessage = encodeURIComponent(message);
            window.open(`https://wa.me/5493544631553?text=${encodedMessage}`, '_blank');
        }

        function closeModal(){
            document.getElementById('productModal').classList.remove('active');
            document.body.style.overflow='auto';
        }

        window.onclick=(e)=>{
            if(e.target===document.getElementById('productModal')) closeModal();
        }
    </script>
</body>
</html>
