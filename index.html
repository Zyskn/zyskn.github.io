                <a href="#" class="btn" id="modalBtn" target="_blank">Comprar por WhatsApp</a>
            </div>

    <script>
        function showMainCategory(section){
            const products=document.querySelectorAll('.product');
            const buttons=document.querySelectorAll('.filter-btn.main');
            const subArriba=document.getElementById('sub-arriba');
            const subAbajo=document.getElementById('sub-abajo');
            const subWrapper=document.getElementById('sub-wrapper');
            const contactWrapper=document.getElementById('contact-wrapper');
            const productsWrapper=document.getElementById('products-wrapper');
            const emptyMsg=document.querySelector('.empty');
            
            buttons.forEach(btn=>btn.classList.remove('active'));
            event.target.classList.add('active');
            
            // Apagar filtros
            subArriba.classList.remove('show');
            subAbajo.classList.remove('show');
            contactWrapper.classList.remove('show');
            document.querySelectorAll('.sub-filters .filter-btn').forEach(btn=>btn.classList.remove('active'));
            
            // REINICIO FORZADO DE WRAPPERS
            [subWrapper, productsWrapper].forEach(w => {
                w.style.transition='none';
                w.classList.remove('show');
                void w.offsetHeight;
                w.style.transition='';
            });
            
            // Activar con slide
            requestAnimationFrame(() => {
                let visibleCount=0;
                if(section==='all'){
                    productsWrapper.classList.add('show');
                    products.forEach(product=>{product.classList.add('show');visibleCount++})
                }else if(section==='arriba'){
                    subWrapper.classList.add('show');
                    productsWrapper.classList.add('show');
                    subArriba.classList.add('show');
                    products.forEach(product=>{if(product.getAttribute('data-section')==='arriba'){product.classList.add('show');visibleCount++}else{product.classList.remove('show')}})
                }else if(section==='abajo'){
                    subWrapper.classList.add('show');
                    productsWrapper.classList.add('show');
                    subAbajo.classList.add('show');
                    products.forEach(product=>{if(product.getAttribute('data-section')==='abajo'){product.classList.add('show');visibleCount++}else{product.classList.remove('show')}})
                }
                if(emptyMsg){emptyMsg.style.display=visibleCount===0&&products.length>0?'block':'none'}
            });
        }
        
        function filterProducts(category){
            const products=document.querySelectorAll('.product');
            const subButtons=document.querySelectorAll('.sub-filters .filter-btn');
            const emptyMsg=document.querySelector('.empty');
            subButtons.forEach(btn=>btn.classList.remove('active'));
            event.target.classList.add('active');
            let visibleCount=0;
            products.forEach(product=>{if(product.getAttribute('data-category')===category){product.classList.add('show');visibleCount++}else{product.classList.remove('show')}});
            if(emptyMsg){emptyMsg.style.display=visibleCount===0&&products.length>0?'block':'none'}
        }
        
        function showContact(){
            const buttons=document.querySelectorAll('.filter-btn.main');
            const contactWrapper=document.getElementById('contact-wrapper');
            const subWrapper=document.getElementById('sub-wrapper');
            const productsWrapper=document.getElementById('products-wrapper');
            
            buttons.forEach(btn=>btn.classList.remove('active'));
            event.target.classList.add('active');
            
            // Apagar wrappers
            subWrapper.classList.remove('show');
            productsWrapper.classList.remove('show');
            
            // RESET COMPLETO: quito inline styles y clase
            contactWrapper.style.transition='none';
            contactWrapper.classList.remove('show');
            contactWrapper.style.removeProperty('max-height');
            contactWrapper.style.removeProperty('transform');
            contactWrapper.style.removeProperty('opacity');
            void contactWrapper.offsetHeight;
            contactWrapper.style.transition='';
            
            // Activar slide hacia abajo
            requestAnimationFrame(() => {
                contactWrapper.classList.add('show')
            });
        }
        
        function openModal(el){
            const modal=document.getElementById('productModal');
            const name=el.getAttribute('data-name');
            const price=el.getAttribute('data-price');
            const desc=el.getAttribute('data-desc');
            const img=el.getAttribute('data-img');
            const sizes=el.getAttribute('data-sizes').split(',');
            const soldout=el.getAttribute('data-soldout')==='true';
            document.getElementById('modalName').textContent=name;
            document.getElementById('modalPrice').textContent='$'+Number(price).toLocaleString('es-AR');
            document.getElementById('modalDesc').textContent=desc;
            document.getElementById('modalImg').src=img;
            const sizesContainer=document.getElementById('modalSizes');
            sizesContainer.innerHTML='';
            sizes.forEach(size=>{
                const btn=document.createElement('button');
                btn.className='size-btn';
                btn.textContent=size;
                btn.onclick=()=>{
                    document.querySelectorAll('.size-btn').forEach(b=>b.classList.remove('active'));
                    btn.classList.add('active')
                };
                sizesContainer.appendChild(btn)
            });
            const modalBtn=document.getElementById('modalBtn');
            if(soldout){
                modalBtn.textContent='Sold Out';
                modalBtn.classList.add('disabled');
                modalBtn.removeAttribute('href')
            }else{
                modalBtn.textContent='Comprar por WhatsApp';
                modalBtn.classList.remove('disabled');
                modalBtn.href=`https://wa.me/5493544631553?text=Hola ZYSKN ★ Quiero el ${name}`
            }
            modal.classList.add('active');
            document.body.style.overflow='hidden'
        }
        
        function closeModal(){
            document.getElementById('productModal').classList.remove('active');
            document.body.style.overflow='auto'
        }
        
        document.getElementById('productModal').onclick=function(e){
            if(e.target===this)closeModal()
        }
    </script>
