    <script>
        function showMainCategory(section){const products=document.querySelectorAll('.product');const buttons=document.querySelectorAll('.filter-btn.main');const subArriba=document.getElementById('sub-arriba');const subAbajo=document.getElementById('sub-abajo');const contactSection=document.getElementById('contactSection');const productGrid=document.getElementById('product-grid');const emptyMsg=document.querySelector('.empty');buttons.forEach(btn=>btn.classList.remove('active'));event.target.classList.add('active');subArriba.classList.remove('show');subAbajo.classList.remove('show');contactSection.classList.remove('show');productGrid.style.display='grid';let visibleCount=0;if(section==='all'){products.forEach(product=>{product.classList.add('show');visibleCount++})}else if(section==='arriba'){subArriba.classList.add('show');products.forEach(product=>{if(product.getAttribute('data-section')==='arriba'){product.classList.add('show');visibleCount++}else{product.classList.remove('show')}})}else if(section==='abajo'){subAbajo.classList.add('show');products.forEach(product=>{if(product.getAttribute('data-section')==='abajo'){product.classList.add('show');visibleCount++}else{product.classList.remove('show')}})}if(emptyMsg){emptyMsg.style.display=visibleCount===0&&products.length>0?'block':'none'}}
        function filterProducts(category){const products=document.querySelectorAll('.product');const buttons=document.querySelectorAll('.filter-btn');const emptyMsg=document.querySelector('.empty');buttons.forEach(btn=>btn.classList.remove('active'));event.target.classList.add('active');let visibleCount=0;products.forEach(product=>{if(product.getAttribute('data-category')===category){product.classList.add('show');visibleCount++}else{product.classList.remove('show')}});if(emptyMsg){emptyMsg.style.display=visibleCount===0&&products.length>0?'block':'none'}}
        function showContact(){const buttons=document.querySelectorAll('.filter-btn.main');const contactSection=document.getElementById('contactSection');const productGrid=document.getElementById('product-grid');const subArriba=document.getElementById('sub-arriba');const subAbajo=document.getElementById('sub-abajo');buttons.forEach(btn=>btn.classList.remove('active'));event.target.classList.add('active');subArriba.classList.remove('show');subAbajo.classList.remove('show');productGrid.style.display='none';contactSection.classList.add('show')}
        function openModal(el){const modal=document.getElementById('productModal');const name=el.getAttribute('data-name');const price=el.getAttribute('data-price');const desc=el.getAttribute('data-desc');const img=el.getAttribute('data-img');const sizes=el.getAttribute('data-sizes').split(',');const soldout=el.getAttribute('data-soldout')==='true';document.getElementById('modalName').textContent=name;document.getElementById('modalPrice').textContent='$'+Number(price).toLocaleString('es-AR');document.getElementById('modalDesc').textContent=desc;document.getElementById('modalImg').src=img;const sizesContainer=document.getElementById('modalSizes');sizesContainer.innerHTML='';sizes.forEach(size=>{const btn=document.createElement('button');btn.className='size-btn';btn.textContent=size;btn.onclick=()=>{document.querySelectorAll('.size-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active')};sizesContainer.appendChild(btn)});const modalBtn=document.getElementById('modalBtn');if(soldout){modalBtn.textContent='Sold Out';modalBtn.classList.add('disabled');modalBtn.removeAttribute('href')}else{modalBtn.textContent='Comprar por WhatsApp';modalBtn.classList.remove('disabled');modalBtn.href=`https://wa.me/5493544631553?text=Hola ZYSKN ★ Quiero el ${name}`}modal.classList.add('active');document.body.style.overflow='hidden'}
        function closeModal(){document.getElementById('productModal').classList.remove('active');document.body.style.overflow='auto'}
        document.getElementById('productModal').onclick=function(e){if(e.target===this)closeModal()}
    </script>
