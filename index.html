<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZYSKN ★</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #fff;
            color: #000;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        .logo {
            font-size: 48px;
            font-weight: 900;
            letter-spacing: -2px;
            margin-bottom: 8px;
        }
        .tagline {
            font-size: 14px;
            letter-spacing: 3px;
            opacity: 0.6;
            text-transform: uppercase;
        }
        .filters {
            text-align: center;
            margin-bottom: 50px;
        }
        .filter-group {
            margin-bottom: 24px;
        }
        .filter-title {
            font-size: 13px;
            opacity: 0.5;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
        }
        .filter-btn {
            background: transparent;
            color: #000;
            border: 1px solid #ccc;
            padding: 8px 14px;
            margin: 4px 3px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .filter-btn:hover, .filter-btn.active {
            background: #000;
            color: #fff;
            border-color: #000;
        }
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 30px;
            min-height: 200px;
        }
        .product {
            text-align: left;
            display: none;
            cursor: pointer;
            position: relative;
        }
        .product.show {
            display: block;
        }
        .product-img-wrap {
            position: relative;
            overflow: hidden;
        }
        .product-img {
            width: 100%;
            aspect-ratio: 3/4;
            object-fit: cover;
            background: #f5f5f5;
            margin-bottom: 12px;
            transition: transform 0.3s;
        }
        .product:hover .product-img {
            transform: scale(1.03);
        }
        .sold-out-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: #000;
            color: #fff;
            padding: 6px 12px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .product-name {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 4px;
            text-transform: uppercase;
        }
        .product-price {
            font-size: 14px;
            opacity: 0.7;
            margin-bottom: 12px;
        }
        .btn {
            display: block;
            width: 100%;
            background: #000;
            color: #fff;
            text-decoration: none;
            padding: 14px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: none;
            cursor: pointer;
            text-align: center;
        }
        .btn:hover {
            opacity: 0.8;
        }
        .btn.disabled {
            background: #eee;
            color: #999;
            cursor: not-allowed;
        }
        .empty {
            grid-column: 1 / -1;
            opacity: 0.3;
            font-size: 14px;
            letter-spacing: 1px;
            padding: 60px 0;
            text-transform: uppercase;
            text-align: center;
        }
        .contact-section {
            display: none;
            text-align: center;
            padding: 60px 0;
        }
        .contact-section.show {
            display: block;
        }
        .contact-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .contact-links {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }
        .contact-link {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #000;
            text-decoration: none;
            font-size: 16px;
            letter-spacing: 1px;
            transition: opacity 0.2s;
        }
        .contact-link:hover {
            opacity: 0.6;
        }
        .contact-link svg {
            width: 28px;
            height: 28px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.98);
            z-index: 1000;
            overflow-y: auto;
            padding: 40px 20px;
        }
        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: #fff;
            max-width: 900px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            position: relative;
            border: 1px solid #eee;
        }
        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 30px;
            cursor: pointer;
            z-index: 10;
            line-height: 1;
        }
        .modal-img {
            width: 100%;
            aspect-ratio: 3/4;
            object-fit: cover;
        }
        .modal-info {
            padding: 40px 40px 40px 0;
            text-align: left;
        }
        .modal-name {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
            text-transform: uppercase;
        }
        .modal-price {
            font-size: 20px;
            margin-bottom: 24px;
        }
        .modal-desc {
            font-size: 14px;
            opacity: 0.7;
            margin-bottom: 24px;
            line-height: 1.6;
        }
        .size-title {
            font-size: 12px;
            opacity: 0.5;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .sizes {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .size-btn {
            border: 1px solid #ccc;
            background: transparent;
            color: #000;
            padding: 10px 16px;
            font-size: 12px;
            cursor: pointer;
        }
        .size-btn.active, .size-btn:hover {
            background: #000;
            color: #fff;
            border-color: #000;
        }
        .footer {
            font-size: 12px;
            opacity: 0.4;
            margin-top: 80px;
            letter-spacing: 1px;
            text-align: center;
        }
        @media (max-width: 768px) {
            .modal-content {
                grid-template-columns: 1fr;
                gap: 0;
            }
            .modal-info {
                padding: 20px;
            }
            .products {
                grid-template-columns: repeat(2, 1fr);
                gap: 20px;
            }
            .filter-btn {
                padding: 7px 10px;
                font-size: 9px;
            }
            .contact-links {
                flex-direction: column;
                gap: 24px;
            }
        }
    </style>
</head>

    <!-- MODAL PRODUCTO -->
    <div class="modal" id="productModal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <img src="" alt="" class="modal-img" id="modalImg">
            <div class="modal-info">
                <h2 class="modal-name" id="modalName"></h2>
                <p class="modal-price" id="modalPrice"></p>
                <p class="modal-desc" id="modalDesc"></p>
                <p class="size-title">Talle</p>
                <div class="sizes" id="modalSizes"></div>
                <a href="#" class="btn" id="modalBtn" target="_blank">Comprar por WhatsApp</a>
            </div>
        </div>
    </div>

    <script>
        function filterProducts(filter) {
            const products = document.querySelectorAll('.product');
            const buttons = document.querySelectorAll('.filter-btn');
            const emptyMsg = document.querySelector('.empty');
            const contactSection = document.getElementById('contactSection');
            const productGrid = document.getElementById('product-grid');
            
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            contactSection.classList.remove('show');
            productGrid.style.display = 'grid';
            
            let visibleCount = 0;
            products.forEach(product => {
                const category = product.getAttribute('data-category');
                
                if (filter === 'all' || category === filter) {
                    product.classList.add('show');
                    visibleCount++;
                } else {
                    product.classList.remove('show');
                }
            });

            if (emptyMsg) {
                emptyMsg.style.display = visibleCount === 0 && products.length > 0 ? 'block' : 'none';
            }
        }

        function showContact() {
            const buttons = document.querySelectorAll('.filter-btn');
            const contactSection = document.getElementById('contactSection');
            const productGrid = document.getElementById('product-grid');
            
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            productGrid.style.display = 'none';
            contactSection.classList.add('show');
        }

        function openModal(el) {
            const modal = document.getElementById('productModal');
            const name = el.getAttribute('data-name');
            const price = el.getAttribute('data-price');
            const desc = el.getAttribute('data-desc');
            const img = el.getAttribute('data-img');
            const sizes = el.getAttribute('data-sizes').split(',');
            const soldout = el.getAttribute('data-soldout') === 'true';

            document.getElementById('modalName').textContent = name;
            document.getElementById('modalPrice').textContent = '$' + Number(price).toLocaleString('es-AR');
            document.getElementById('modalDesc').textContent = desc;
            document.getElementById('modalImg').src = img;

            const sizesContainer = document.getElementById('modalSizes');
            sizesContainer.innerHTML = '';
            sizes.forEach(size => {
                const btn = document.createElement('button');
                btn.className = 'size-btn';
                btn.textContent = size;
                btn.onclick = () => {
                    document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                };
                sizesContainer.appendChild(btn);
            });

            const modalBtn = document.getElementById('modalBtn');
            if (soldout) {
                modalBtn.textContent = 'Sold Out';
                modalBtn.classList.add('disabled');
                modalBtn.removeAttribute('href');
            } else {
                modalBtn.textContent = 'Comprar por WhatsApp';
                modalBtn.classList.remove('disabled');
                modalBtn.href = `https://wa.me/5493544631553?text=Hola ZYSKN ★ Quiero el ${name}`;
            }

            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('productModal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        document.getElementById('productModal').onclick = function(e) {
            if (e.target === this) closeModal();
        }
    </script>
</body>
