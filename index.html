  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --accent: #000;
      --gray-bg: #F5F5F5;
      --text-muted: #666;
      --blue: #3B82F6;
      --red: #D00000;
      --whatsapp: #25D366;
      --instagram: #E4405F;
      --celeste: #87CEEB;
      --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      --container-max: 1200px;
    }

    #supreme-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #000; z-index: 9999;
      animation: fadeOutOverlay 0.4s ease-in-out forwards;
      pointer-events: none;
    }
    
    @keyframes fadeOutOverlay {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #fff;
      color: #000;
      line-height: 1.4;
      overflow-x: hidden;
      position: relative;
      animation: contentShine 0.4s ease-out forwards;
      scroll-behavior: smooth;
    }

    @keyframes contentShine {
      0% { filter: brightness(0.5); }
      100% { filter: brightness(1); }
    }

    .top-bar {
      background: var(--red);
      color: #fff;
      padding: 10px 0;
      font-size: 0.85rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      overflow: hidden;
      white-space: nowrap;
      position: relative;
      z-index: 1000;
    }
    .marquee-content {
      display: inline-block;
      animation: marquee-infinite 25s linear infinite;
      padding-left: 100%;
    }
    .marquee-item {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-right: 60px;
    }
    .marquee-item svg { width: 20px; height: 20px; fill: #fff; }
    .marquee-item span { color: #fff; }
    @keyframes marquee-infinite {
      0% { transform: translateX(0); }
      100% { transform: translateX(-100%); }
    }

    header {
      position: sticky;
      top: 0;
      z-index: 2000;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #000;
      transition: padding 0.3s var(--transition);
      padding: 2rem 3rem;
    }
    header.scrolled { padding: 1.2rem 3rem; }

    .header-content {
      max-width: 100%;
      padding: 0 1rem;
      margin: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
    }

    .logo-section { display: flex; flex-direction: column; cursor: pointer; flex-shrink: 0; }
    .logo { font-size: 2.4rem; font-weight: 900; letter-spacing: -0.02em; text-transform: uppercase; }
    .logo-slogan { font-size: 0.85rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; }

    .hamburger { display: none; }

    .nav-container {
      display: flex;
      align-items: center;
      gap: 3rem;
      flex-grow: 1;
      justify-content: flex-end;
      overflow: hidden;
    }

    .nav-main { 
      display: flex; 
      gap: 3rem; 
      align-items: center; 
      transition: transform 0.4s var(--transition), opacity 0.3s ease;
      flex-shrink: 0;
    }

    .nav-container.searching .nav-main {
      transform: translateX(-80px);
      opacity: 0.2;
      pointer-events: none;
    }

    .nav-item { position: relative; padding: 1.5rem 0; }
    .nav-main a {
      font-size: 0.95rem;
      font-weight: 600;
      text-transform: uppercase;
      text-decoration: none;
      color: #000;
      cursor: pointer;
      position: relative;
      padding-bottom: 0.25rem;
      border-bottom: 2px solid transparent;
      transition: border-color 0.3s var(--transition);
      white-space: nowrap;
    }
    .nav-main a:hover { border-bottom-color: #000; }

    .nav-item-new a { color: var(--red) !important; font-weight: 900 !important; }

    .sub-nav-wrapper {
      position: absolute;
      top: 100%;
      left: 0;
      background: #fff;
      border: 1px solid #000;
      width: 240px;
      padding: 0.75rem 0;
      display: none;
      flex-direction: column;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s var(--transition);
      pointer-events: none;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    .nav-item:hover .sub-nav-wrapper {
      display: flex;
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    .sub-nav-item {
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      cursor: pointer;
      padding: 0.8rem 1.5rem;
      transition: all 0.2s var(--transition);
    }
    .sub-nav-item:hover { background: var(--gray-bg); padding-left: 2rem; }

    .search-wrapper {
      display: flex;
      align-items: center;
      position: relative;
    }

    .search-input-container {
      width: 0;
      overflow: hidden;
      transition: width 0.4s var(--transition);
      display: flex;
      align-items: center;
    }

    .nav-container.searching .search-input-container {
      width: 350px;
      margin-right: 1.5rem;
    }

    .search-input-container input {
      width: 100%;
      padding: 0.8rem 1.5rem;
      border: 2px solid var(--celeste);
      border-radius: 50px;
      outline: none;
      font-family: inherit;
      font-size: 0.9rem;
      text-transform: uppercase;
      font-weight: 700;
      background: #fff;
      box-shadow: 0 4px 15px rgba(135, 206, 235, 0.2);
    }

    .nav-actions { display: flex; gap: 1.5rem; align-items: center; flex-shrink: 0; }
    .icon-btn {
      background: none; border: none; cursor: pointer;
      padding: 0.5rem; transition: transform 0.2s var(--transition);
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .icon-btn svg { width: 24px; height: 24px; fill: currentColor; }
    .icon-btn:hover { transform: scale(1.1); }
    .search-icon { color: var(--blue); }
    .cart-icon { color: var(--red); }
    
    .auth-status { font-size: 0.85rem; font-weight: 700; text-transform: uppercase; cursor: pointer; color: #000; }
    .auth-status:hover { opacity: 0.7; }

    .cart-badge {
      position: absolute; top: -2px; right: -2px;
      background: #000; color: #fff;
      width: 16px; height: 16px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem; font-weight: 700;
    }

    section {
      padding: 6rem 2rem;
      max-width: var(--container-max);
      margin: 0 auto;
    }

    .hero {
      height: 80vh; min-height: 500px;
      background: linear-gradient(135deg, #000 0%, #333 100%);
      display: flex; align-items: center; justify-content: center;
      color: #fff; text-align: center;
      max-width: 100%;
    }
    .hero h1 { font-size: clamp(2rem, 7vw, 4.5rem); font-weight: 900; text-transform: uppercase; letter-spacing: -0.02em; }

    .btn {
      display: inline-block; padding: 0.8rem 1.8rem;
      background: #fff; color: #000; border: 2px solid #fff;
      font-size: 0.8rem; font-weight: 700; text-transform: uppercase;
      cursor: pointer; transition: var(--transition); text-decoration: none;
      margin-top: 1.5rem;
    }
    .btn:hover { background: #000; color: #fff; transform: scale(1.05); }

    .section-title { font-size: clamp(1.4rem, 4vw, 2.2rem); font-weight: 900; text-transform: uppercase; margin-bottom: 2.5rem; letter-spacing: -0.02em; }
    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1.5rem; }
    .product-card { cursor: pointer; transition: transform 0.3s var(--transition); }
    .product-image { width: 100%; aspect-ratio: 3/4; background: var(--gray-bg); overflow: hidden; margin-bottom: 0.8rem; }
    .product-image img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s var(--transition); }

    #product-detail { display: none; border-top: 1px solid #000; border-bottom: 1px solid #000; }
    #product-detail.active { display: block; }

    #cart-section { background: #fff; border-top: 1px solid #000; }
    .cart-container { max-width: 800px; margin: 0 auto; }
    .form-group { margin-bottom: 1rem; text-align: left; }
    .form-group label { display: block; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; margin-bottom: 0.3rem; }
    .form-group input { width: 100%; padding: 0.6rem; border: 1px solid #000; font-size: 0.8rem; outline: none; }

    .contact-icon-btn {
      width: 70px; height: 70px; border-radius: 50%; 
      background: #000;
      display: flex; align-items: center; justify-content: center; 
      color: #fff; 
      margin: 0 auto 0.8rem auto; 
      transition: all 0.3s ease;
    }
    .contact-icon-btn svg { width: 32px; height: 32px; transition: all 0.3s ease; }
    
    .contact-item:hover .icon-wa-btn { background: var(--whatsapp); transform: scale(1.1); }
    .contact-item:hover .icon-ig-btn { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); transform: scale(1.1); }

    .notification {
      position: fixed; bottom: 2rem; right: 2rem;
      background: #000; color: #fff; padding: 1rem 2rem;
      font-size: 0.8rem; font-weight: 700; text-transform: uppercase;
      z-index: 3000; display: none;
      animation: slideIn 0.3s ease-out;
    }
    @keyframes slideIn { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    @media (max-width: 1024px) {
      header { padding: 1rem 1.5rem; }
      header.scrolled { padding: 0.8rem 1.5rem; }
      
      .header-content {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
      }
      
      .logo-section { order: 1; }
      
      .hamburger {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        width: 28px;
        height: 22px;
        background: none;
        border: none;
        cursor: pointer;
        padding: 0;
        z-index: 2001;
        order: 2;
      }
      
      .hamburger span {
        display: block;
        height: 3px;
        width: 100%;
        background: #000;
        transition: all 0.3s ease;
      }
      
      .hamburger.active span:nth-child(1) {
        transform: rotate(45deg) translate(7px, 7px);
      }
      .hamburger.active span:nth-child(2) {
        opacity: 0;
      }
      .hamburger.active span:nth-child(3) {
        transform: rotate(-45deg) translate(7px, -7px);
      }
      
      .nav-actions { 
        display: flex; 
        gap: 15px;
        align-items: center;
        order: 3; 
      }
      
      .nav-actions .search-wrapper,
      .nav-actions #searchInput,
      .nav-actions .search-input-container {
        display: none;
      }
      
      .nav-actions .icon-btn {
        display: flex;
        background: none;
        border: none;
        padding: 5px;
        cursor: pointer;
      }
      
      .nav-actions .search-icon { color: var(--blue); }
      .nav-actions .cart-icon { color: var(--red); }
      .nav-actions .auth-status { font-size: 0.75rem; }
      
      .nav-container {
        position: fixed;
        top: 0;
        right: -100%;
        width: 80%;
        max-width: 320px;
        height: 100vh;
        background: #fff;
        flex-direction: column;
        justify-content: flex-start;
        align-items: flex-start;
        padding: 6rem 2rem;
        box-shadow: -5px 0 20px rgba(0,0,0,0.1);
        transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        overflow-y: auto;
        gap: 0;
      }
      
      .nav-container.active {
        right: 0;
      }
      
      .nav-main {
        display: flex !important;
        flex-direction: column;
        gap: 0;
        width: 100%;
        transform: none !important;
        opacity: 1 !important;
      }
      
      .nav-item {
        padding: 1rem 0;
        border-bottom: 1px solid #eee;
        width: 100%;
      }
      
      .nav-main a { font-size: 1.1rem; }
      
      .sub-nav-wrapper {
        position: static;
        display: flex;
        opacity: 1;
        transform: none;
        box-shadow: none;
        border: none;
        padding: 0.5rem 0 0 1rem;
        pointer-events: auto;
        width: 100%;
      }
      
      section { padding: 4rem 1.5rem; }
      .product-detail-grid { grid-template-columns: 1fr !important; }
    }
  </style>
</head>

  <div id="notification" class="notification"></div>

  <header id="header">
    <div class="header-content">
      <div class="logo-section" onclick="scrollToTop()">
        <span class="logo">ZYSKN ★</span>
        <span class="logo-slogan">Curated Vintage</span>
      </div>

      <button class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <div id="navContainer" class="nav-container">
        <nav class="nav-main">
          <div class="nav-item"><a onclick="showMainCategory('todo', event)">TODO</a></div>
          <div class="nav-item nav-item-new"><a onclick="scrollToSection('nuevo-section')">NEW</a></div>
          <div class="nav-item">
            <a onclick="showMainCategory('arriba', event)">ARRIBA</a>
            <div class="sub-nav-wrapper">
              <div class="sub-nav-item" onclick="filterProducts('remeras')">Remeras</div>
              <div class="sub-nav-item" onclick="filterProducts('chombas')">Chombas</div>
              <div class="sub-nav-item" onclick="filterProducts('hoodies')">Hoodies</div>
              <div class="sub-nav-item" onclick="filterProducts('camisas')">Camisas</div>
            </div>
          </div>
          <div class="nav-item">
            <a onclick="showMainCategory('abajo', event)">ABAJO</a>
            <div class="sub-nav-wrapper">
              <div class="sub-nav-item" onclick="filterProducts('pantalones')">Pantalones</div>
              <div class="sub-nav-item" onclick="filterProducts('jeans')">Jeans</div>
              <div class="sub-nav-item" onclick="filterProducts('bermudas')">Bermudas</div>
            </div>
          </div>
          <div class="nav-item"><a onclick="scrollToSection('contact')">CONTACTO</a></div>
        </nav>
      </div>

      <div class="nav-actions">
        <div class="search-wrapper">
          <div class="search-input-container">
            <input type="text" id="searchInput" placeholder="BUSCAR PRENDA..." onkeyup="handleSearch(event)">
          </div>
          <button class="icon-btn search-icon" onclick="toggleSearch()">
            <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
          </button>

  </header>

  <main>
    <section class="hero">
      <div class="hero-content">
        <h1>PROXIMAMENTE...</h1>
        <a onclick="scrollToSection('shop')" class="btn">COMPRAR AHORA</a>
      </div>
    </section>

    <section id="nuevo-section" style="background: #fff; border-bottom: 1px solid #000;">
      <h2 class="section-title" style="color: var(--red);">NUEVO</h2>
      <div id="nuevoProductsGrid" class="products-grid"></div>
    </section>

    <section id="product-detail">
      <div class="product-detail-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:3rem; align-items:start;">
        <div class="product-image" style="background:#f5f5f5; aspect-ratio:3/4;"><img id="detailImage" src="" alt="" style="width:100%; height:100%; object-fit:cover;"></div>
